<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Leave Request Approval</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- SweetAlert2 for logout -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: linear-gradient(120deg, #dff5e4, #f8fffb, #e0f2df);
      background-size: cover;
      background-attachment: fixed;
      color: #333;
      display: flex;
      flex-direction: column;
    }

    /* -----------------------------------
   Header
----------------------------------- */
    .header {
      background: linear-gradient(90deg, #3a9d79, #52af8d);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      height: 56px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-box {
      background-color: #ffffff;
      color: #333;
      font-weight: bold;
      font-size: 18px;
      padding: 6px 14px;
      border-radius: 8px;
      margin-right: 12px;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.15);
    }

    .worklife-text {
      font-size: 22px;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header select {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background-color: white;
      color: #444;
      font-weight: 600;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.15);
    }

    .profile {
      font-weight: bold;
    }

    .logout {
      cursor: pointer;
      transition: 0.3s;
    }

    .logout:hover {
      color: #ffe6e6;
    }

    /* -----------------------------------
   Main Layout
----------------------------------- */
    .main {
      display: flex;
      padding-top: 10px;
    }

    /* -----------------------------------
   Left Panel
----------------------------------- */
    .left-panel {
      width: 110px;
      padding: 10px 15px;
      display: flex;
      flex-direction: column;
      gap: 0px;
    }

    .left-panel button {
      width: 98px;
      height: 98px;
      border: none;
      border-radius: 0px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
    }

    .left-panel button:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
    }

    .left-panel i {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .btn-hr {
      background-color: #7f6aa8;
    }

    .btn-finance {
      background-color: #cb7e56;
    }

    .btn-it {
      background-color: #773631;
    }

    .btn-pm {
      background-color: #138f6c;
    }

    .btn-reports {
      background-color: #71a92c;
    }

    /* -----------------------------------
   Content Area
----------------------------------- */
    .content {
      flex: 1;
      padding: 30px;
      background-color: #ffffff;
      margin: 10px 10px 10px 0px;
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .content h1 {
      font-size: 26px;
      margin-bottom: 25px;
      color: #444;
    }

    /* -----------------------------------
   Status Buttons
----------------------------------- */
    .status-buttons button {
      background: #ffffff;
      border: 2px solid #d0d0d0;
      padding: 10px 20px;
      margin-right: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .status-buttons button:hover {
      background-color: #5654ce;
      color: white;
      border-color: #3a9d79;
    }

    /* -----------------------------------
   Table
----------------------------------- */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    th {
      background-color: #3a9d79;
      color: white;
      padding: 12px;
      font-size: 15px;
      border-right: 1px solid #dcdcdc;
    }

    td {
      background-color: #ffffff;
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      border-right: 1px solid #5dbd98;
    }

    tr:hover td {
      background-color: #e4f3eb;
    }

    /* -----------------------------------
   Status Box
----------------------------------- */
    /* -----------------------------------
   Status Box
----------------------------------- */
    .status-box {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      display: inline-block;
    }

    .status-box.pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-box.approved {
      background: #d4edda;
      color: #155724;
    }

    .status-box.cancelled {
      background: #f8d7da;
      color: #721c24;
    }

    /* -----------------------------------
   Action Icons
----------------------------------- */
    .action-icons {
      display: flex;
      gap: 12px;
    }

    .icon-box {
      padding: 10px;
      border-radius: 8px;
      background-color: #f1f1f1;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .icon-box:hover {
      transform: scale(1.1);
    }

    .icon-box.view:hover {
      background-color: #3a9d79;
      color: white;
    }

    .icon-box.delete:hover {
      background-color: #dc3545;
      color: white;
    }

    /* -----------------------------------
   Modal
----------------------------------- */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #ffffff;
      width: 480px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
      position: relative;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
    }

    .close-btn i {
      color: red;
    }

    .modal-content button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }



    .modal-content .approve-btn {
      background-color: #28a745;
    }

    button.approve-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
      color: #da9898;
      border: 1px solid #002902;
      opacity: 0.7;
    }

    button.cancel-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
      color: #da9898;
      border: 1px solid #f44336;
      opacity: 0.7;
    }


    .modal-content .cancel-btn {
      background-color: #dc3545;
    }

    #approvalNote {
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #333;
      cursor: pointer;
    }

    .close-btn i {
      color: red;
    }

    .swal2-validation-message {
      color: red !important;
    }



    /* MAIN TOOLBAR CONTAINER */
    .filter-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      /* mobile support */
    }

    /* LEFT SIDE BUTTONS */
    .status-buttons {
      display: flex;
      gap: 10px;
    }

    /* RIGHT SIDE SECTION */
    .right-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* DATE + REPORT BUTTONS */
    .date-btn,
    .report-btn {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .date-btn {
      background: #173E9A;
      color: white;
    }

    .report-btn {
      background: white;
      border: 1px solid #173E9A;
      color: #173E9A;
    }

    /* SEARCH BOX */
    .search-box {
      position: relative;
    }

    .search-box input {
      padding: 8px 30px 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .search-icon {
      position: absolute;
      right: 10px;
      top: 9px;
      color: gray;
    }

    .clear-search {
      position: absolute;
      right: 28px;
      top: 5px;
      font-size: 20px;
      cursor: pointer;
      display: none;
    }


    /* DATE POPUP */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
    }

    .popup-box input[type=date] {
      width: 92%;
      padding: 8px;
      margin-bottom: 12px;
    }

    .popup-box label {
      color: #173E9A;
      font-weight: bold;
    }

    .popup-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Popup Buttons — use unique class names */
    .apply-btn {
      background: #173E9A;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
    }

    .popup-cancel-btn {
      background: white;
      color: #173E9A;
      border: 1px solid #173E9A;
      padding: 8px 12px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <!-- === HEADER === -->
  <header>
    <div class="header">
      <!-- Left -->
      <div class="header-left" id="goDashboard">
        <div class="logo-box">WL</div>
        <div class="worklife-text">Worklife</div>
      </div>
      <!-- Right -->
      <div class="header-right">
        <select>
          <option>Eastern</option>
          <option>Western</option>
          <option>Northern</option>
          <option>Southern</option>
        </select>
        <span>English</span>
        <div class="profile">
          <i class="fa-solid fa-circle-user"></i>
          <span id="userName" style="text-transform: capitalize;">Loading...</span>
        </div>
        <div class="logout" id="logoutBtn">
          <i class="fas fa-power-off"></i>
        </div>
      </div>
    </div>
  </header>

  <!-- === MAIN === -->
  <div class="main">
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <button class="btn-hr" id="hrBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-regular fa-user"></i>
          <span>HR</span>
        </div>
      </button>
      <button class="btn-finance" id="financeBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-regular fa-folder"></i>
          <span>Finance</span>
        </div>
      </button>
      <button class="btn-it" id="itBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-solid fa-desktop"></i>
          <span>IT</span>
        </div>
      </button>
      <button class="btn-pm" id="performanceBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-solid fa-clock"></i>
          <span>Performance</span>
        </div>
      </button>
      <button class="btn-reports" id="reportsBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-solid fa-chart-bar"></i>
          <span>Reports</span>
        </div>
      </button>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <h1>Leave Requests</h1>

      <div class="filter-toolbar">

        <div class="status-buttons">
          <button id="allBtn">All</button>
          <button id="approvedBtn">Approved</button>
          <button id="pendingBtn">Pending</button>
          <button id="cancelledBtn">Cancelled</button>
        </div>

        <div class="right-controls">
          <button id="leaveDateBtn" class="date-btn"></button>
          <button id="leaveReportBtn" class="report-btn">Generate Report</button>

          <div class="search-box">
            <input type="text" id="leaveSearch" placeholder="Search by name…" maxlength="40">
            <i class="fa fa-search search-icon"></i>
            <span id="clearLeaveSearch" class="clear-search">×</span>
          </div>
        </div>

      </div>

      <!-- OUTSIDE toolbars -->
      <div class="popup-overlay" id="leaveDatePopup">
        <div class="popup-box">
          <h3>Select Date Range</h3>

          <label>Start Date</label>
          <input type="date" id="leaveStartDate">

          <label>End Date</label>
          <input type="date" id="leaveEndDate">

          <div class="popup-actions">
            <button class="apply-btn" id="applyLeaveDate">Apply</button>
            <button class="popup-cancel-btn" id="cancelLeaveDate">Cancel</button>
          </div>
        </div>
      </div>


      <!-- Table -->
      <table id="requestsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Requested By</th>
            <th>Type</th>
            <th>Admin Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Rows added dynamically -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="viewModal">
    <div class="modal-content">
      <span class="close-btn" id="closeModalBtn">
        <i class="fa-solid fa-rectangle-xmark"></i>
      </span>
      <h3>
        Leave Request Details
        <span id="modalStatusTag" class="status-box small">Status</span>
      </h3>
      <div id="requestDetails"></div>
      <button class="approve-btn" id="approveBtn">Approve</button>
      <button class="btn btn-danger cancel-btn" id="cancelBtn">Cancel</button>
      <div id="approvalNote"></div>
      <div id="approvalMessage"></div>
    </div>
  </div>


  <script>
    let userRole;
    let currentRequestId = null;

    let leaveFilter = {
      status: "all",
      search: "",
      start_date: "",
      end_date: ""
    };

    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    const type = getQueryParam("type");
    console.log("TYPE:", type);


    // Session check + user name
    fetch("/api/auth/session-check", { credentials: "include" })
      .then(res => res.json())
      .then(data => {
        if (!data.loggedIn) {
          window.location.href = "index.html";
        } else {
          document.getElementById("userName").textContent = data.user.name;
          userRole = data.user.roleId;
          console.log("ROLE:", userRole);


          if (type === "myrequest") {
            loadRequests("myrequest", data.user.email);
          } else if (type === "pending") {
            loadRequests("pending");
          } else {
            loadRequests("all");
          }
        }
      })
      .catch(err => {
        console.error("Session check failed:", err);
        window.location.href = "index.html";
      });


    // load 
    function loadRequests(roleStatus, userEmail = null) {
      const role = userRole;
      let url = `/api/leave`;

      const params = new URLSearchParams();

      // Always send role
      params.append("role", role);

      // STATUS FILTER (backend)
      if (leaveFilter.status !== "all") {
        params.append("status", leaveFilter.status);
      }

      // SEARCH FILTER (backend)
      if (leaveFilter.search) {
        params.append("search", leaveFilter.search);
      }

      // DATE FILTER (backend)
      if (leaveFilter.start_date) {
        params.append("start_date", leaveFilter.start_date);
      }
      if (leaveFilter.end_date) {
        params.append("end_date", leaveFilter.end_date);
      }

      // MY REQUESTS
      if (roleStatus === "myrequest" && userEmail) {
        params.append("requester_email", userEmail);
      }

      // ROLE STATUS FILTER (optional)
      if (roleStatus && roleStatus !== "all" && roleStatus !== "myrequest") {
        params.append("roleStatus", roleStatus);
      }

      const finalURL = `${url}?${params.toString()}`;

      fetch(finalURL)
        .then(res => res.json())
        .then(data => {
          data.sort((a, b) => b.id - a.id);
          const tbody = document.querySelector("#requestsTable tbody");
          tbody.innerHTML = "";

          data.forEach((req, index) => {
            const tr = document.createElement("tr");

            // ✅ normal columns
            tr.innerHTML = `
    <td>${index + 1}</td>
    <td>${req.requester_name || req.requester_email || 'N/A'}</td>
    <td>${req.leave_type}</td>
    <td>
      <span class="status-box ${(req.status || "").toLowerCase()}">
        ${req.status}
      </span>
    </td>
  `;

            // ✅ action column
            const actionTd = document.createElement("td");

            // 👁 VIEW BUTTON
            const viewBtn = document.createElement("span");
            viewBtn.className = "icon-box view";
            viewBtn.innerHTML = `<i class="fas fa-eye"></i>`;
            viewBtn.addEventListener("click", () => {
              viewRequest(req.id);
            });

            // 🗑 DELETE BUTTON
            const deleteBtn = document.createElement("span");
            deleteBtn.className = "icon-box delete";
            deleteBtn.innerHTML = `<i class="fas fa-trash"></i>`;
            deleteBtn.addEventListener("click", () => {
              deleteRequest(req.id);
            });

            // append buttons
            actionTd.appendChild(viewBtn);
            actionTd.appendChild(deleteBtn);

            tr.appendChild(actionTd);

            tbody.appendChild(tr);
          });
        });
    }





    // ============================
    //  STATUS FILTER BUTTONS
    // ============================
    function filterLeave(status) {
      leaveFilter.status = status.toLowerCase();
      loadRequests("all");
    }


    // ============================
    //  SEARCH FILTER
    // ============================
    const leaveSearch = document.getElementById("leaveSearch");
    const clearSearch = document.getElementById("clearLeaveSearch");

    leaveSearch.addEventListener("input", function () {
      let value = this.value;
      if (!/^[A-Za-z\s]*$/.test(value)) return;

      leaveFilter.search = value.trim();
      clearSearch.style.display = value ? "block" : "none";

      loadRequests("all");
    });

    clearSearch.addEventListener("click", () => {
      leaveSearch.value = "";
      leaveFilter.search = "";
      clearSearch.style.display = "none";
      loadRequests("all");
    });


    // ============================
    //  DATE POPUP
    // ============================
    document.getElementById("leaveDateBtn")
      .addEventListener("click", () => {
        document.getElementById("leaveDatePopup").style.display = "flex";
      });

    document.getElementById("cancelLeaveDate")
      .addEventListener("click", () => {
        document.getElementById("leaveDatePopup").style.display = "none";
      });

    document.getElementById("applyLeaveDate")
      .addEventListener("click", () => {
        const s = document.getElementById("leaveStartDate").value;
        const e = document.getElementById("leaveEndDate").value;

        if (s && e && s > e) {
          alert("Start Date cannot be greater than End Date");
          return;
        }

        leaveFilter.start_date = s;
        leaveFilter.end_date = e;

        document.getElementById("leaveDatePopup").style.display = "none";
        loadRequests("all");
      });

    document.getElementById("leaveReportBtn")
      .addEventListener("click", () => {
        let url = "/api/leave?report=1";

        if (leaveFilter.status !== "all") url += `&status=${leaveFilter.status}`;
        if (leaveFilter.search) url += `&search=${leaveFilter.search}`;
        if (leaveFilter.start_date) url += `&start_date=${leaveFilter.start_date}`;
        if (leaveFilter.end_date) url += `&end_date=${leaveFilter.end_date}`;

        window.location = url;
      });


    // ============================
    //  SHOW TODAY DATE ON BUTTON
    // ============================
    (function setTodayDate() {
      const btn = document.getElementById("leaveDateBtn");
      const now = new Date();
      const day = now.getDate();
      const month = now.toLocaleString("en-US", { month: "long" });
      const year = now.getFullYear();
      btn.innerText = `${day} ${month} ${year}`;
    })();


    // ===============================
    // DOWNLOAD LEAVE REPORT (same as expense)
    // ===============================
    const leaveReportBtn = document.getElementById("leaveReportBtn");

    if (leaveReportBtn) {
      leaveReportBtn.addEventListener("click", () => {

        let url = "/api/leave?report=1";

        // status filter
        if (leaveFilter.status && leaveFilter.status !== "all") {
          url += `&status=${leaveFilter.status}`;
        }

        // search by name
        if (leaveFilter.search) {
          url += `&search=${leaveFilter.search}`;
        }

        // date range
        if (leaveFilter.start_date) {
          url += `&start_date=${leaveFilter.start_date}`;
        }

        if (leaveFilter.end_date) {
          url += `&end_date=${leaveFilter.end_date}`;
        }

        // DOWNLOAD CSV
        window.location = url;
      });
    }




    // onclick buttons
    document.addEventListener("DOMContentLoaded", () => {

      document.getElementById("goDashboard")
        ?.addEventListener("click", () => window.location.href = "dashboard.html");

      document.getElementById("logoutBtn")
        ?.addEventListener("click", logoutUser);

      document.getElementById("hrBtn")
        ?.addEventListener("click", () => window.location.href = "humanresource.html?section=hr-logo");

      document.getElementById("financeBtn")
        ?.addEventListener("click", () => window.location.href = "humanresource.html?section=finance-logo");

      document.getElementById("itBtn")
        ?.addEventListener("click", () => window.location.href = "humanresource.html?section=it-logo");

      document.getElementById("performanceBtn")
        ?.addEventListener("click", () => window.location.href = "humanresource.html?section=performance-logo");

      document.getElementById("reportsBtn")
        ?.addEventListener("click", () => window.location.href = "humanresource.html?section=reports-logo");

      document.getElementById("allBtn")?.addEventListener("click", () => filterLeave("all"));
      document.getElementById("approvedBtn")?.addEventListener("click", () => filterLeave("approved"));
      document.getElementById("pendingBtn")?.addEventListener("click", () => filterLeave("pending"));
      document.getElementById("cancelledBtn")?.addEventListener("click", () => filterLeave("cancelled"));

      document.getElementById("closeModalBtn")
        ?.addEventListener("click", closeModal);

      document.getElementById("approveBtn")
        ?.addEventListener("click", () => updateStatus("approved"));

      document.getElementById("cancelBtn")
        ?.addEventListener("click", () => updateStatus("cancelled"));

    });




    // logout
    function logoutUser() {
      Swal.fire({
        title: "Are you sure?",
        text: "You will be logged out.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Yes, logout",
        cancelButtonText: "Cancel"
      }).then((result) => {
        if (result.isConfirmed) {
          fetch("/api/auth/logout")
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                Swal.fire({
                  title: "Logged Out!",
                  icon: "success",
                  showConfirmButton: false,
                  timer: 2000
                });
                setTimeout(() => window.location.href = "index.html", 2000);
              } else {
                Swal.fire("Oops!", "Logout failed.", "error");
              }
            });
        }
      });
    }


    // view request
    function viewRequest(id) {
      currentRequestId = id;
      fetch(`/api/leave/${id}`)
        .then(res => res.json())
        .then(data => {

          console.log('data', data)
          const fromDate = new Date(data.from_date).toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric"
          });
          const toDate = new Date(data.to_date).toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric"
          });
          // status tag
          const statusTag = document.getElementById("modalStatusTag");
          statusTag.textContent = data.status || "N/A";
          statusTag.classList.remove("approved", "pending", "cancelled");
          statusTag.classList.add((data.status || "").toLowerCase());

          const detailDiv = document.getElementById("requestDetails");
          detailDiv.innerHTML = `
            <p><strong>Requester Name:</strong> ${data.requester_name}</p>
            <p><strong>Request No:</strong> ${data.req_no}</p>
            <p><strong>Requester Email:</strong> ${data.email_id}</p>
            <p><strong>Company:</strong> ${data.company}</p>
            <p><strong>Department:</strong> ${data.department_name}</p>
            <p><strong>Designation:</strong> ${data.designation}</p>
            <p><strong>Leave Type:</strong> ${data.leave_type}</p>
            <p><strong>From:</strong> ${fromDate}</p>
            <p><strong>To:</strong> ${toDate}</p>
            <p><strong>Requested Days:</strong> ${data.requested_days}</p>
            <p><strong>Medical Certificate:</strong> 
              ${data.medical_certificates
              ? `<a href="${window.location.origin}${data.medical_certificates}" target="_blank">View Certificate</a>`
              : 'No certificate uploaded'}
            </p>
            <p style="text-transform: capitalize"><strong>Comments:</strong> ${data.requester_comments}</p>
            <p><strong>Task Assigned:</strong></p>
           ${data.assignments && data.assignments.length > 0
              ? `
              <table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; margin-left: 10px; margin-top: 10px; width: 95%;">
                <thead style="background: #f5f5f5;">
                  <tr>
                    <th>Assigned Employee</th>
                    <th>Task Description</th>
                    </tr>
                </thead>
                <tbody>
                  ${data.assignments.map(task => `
                  <tr>
                    <td>${task.assigned_employee_name}</td>
                    <td>${task.task_description}</td>
                  </tr>
                  `).join("")}
                  </tbody>
                  </table>
                  `
              : `<p style="margin-left: 10px;">No task assigned</p>`
            }
                  `;
          document.getElementById("viewModal").style.display = "flex";
          //  Hide buttons if employee

          const approveBtn = document.querySelector(".approve-btn");
          const cancelBtn = document.querySelector(".cancel-btn");
          const noteDiv = document.getElementById("approvalNote");
          const approvalMessage = document.getElementById("approvalMessage");


          if (userRole === "employee") {
            // Employees don’t see the buttons
            approveBtn.style.display = "none";
            cancelBtn.style.display = "none";
          } else {

            const approvedStatus = data.approval_status;


            if (approvedStatus === "approved") {
              approveBtn.disabled = true;
              cancelBtn.disabled = true;
              approvalMessage.style.display = "block";
              approvalMessage.style.color = "green";
              approvalMessage.textContent = "You have already approved this request.";
            } else if (approvedStatus === "cancelled") {
              approveBtn.disabled = true;
              cancelBtn.disabled = true;
              approvalMessage.style.display = "block";
              approvalMessage.style.color = "red";
              approvalMessage.textContent = "You have already cancelled this request.";
            }
            else if (approvedStatus === "skipped") {
              approveBtn.disabled = true;
              cancelBtn.disabled = true;
            } else {
              approveBtn.style.display = "inline-block";
              cancelBtn.style.display = "inline-block";
              approvalMessage.style.display = "none";
            }
          }
        });
    }

    // delete request (SweetAlert version)
    function deleteRequest(id) {
      Swal.fire({
        title: "Are you sure?",
        text: "This request will be deleted permanently.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Yes, delete it",
        cancelButtonText: "Cancel"
      }).then((result) => {
        if (result.isConfirmed) {
          fetch(`/api/leave/${id}`, { method: "DELETE" })
            .then(res => res.json())
            .then(data => {
              Swal.fire("Deleted!", data.message || "Leave request deleted.", "success");
              loadRequests('all');
            });
        }
      });
    }


    // update status
    function updateStatus(newStatus) {
      if (!currentRequestId) return;
      console.log("Status clicked:", newStatus);

      if (newStatus === "cancelled") {
        Swal.fire({
          title: "Why are you cancelling this leave?",
          input: "text",
          inputLabel: "Cancellation Reason",
          inputPlaceholder: "Enter reason here...",
          inputValidator: (value) => {
            if (!value || value.trim() === "") {
              return "Cancellation reason is required!";
            }
          },
          showCancelButton: true,
          confirmButtonText: "Submit",
          cancelButtonText: "Cancel"
        }).then((result) => {
          if (result.isConfirmed) {
            const reason = result.value;

            fetch(`/api/leave/update-status/${currentRequestId}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                status: newStatus,
                role: "admin",
                reason: reason
              })
            })

              .then(res => res.json())
              .then(data => {
                Swal.fire("Cancelled!", data.message, "success");

                document.querySelectorAll(".approve-btn").forEach(btn => btn.disabled = true);
                document.querySelectorAll(".modal-cancel-btn").forEach(btn => btn.disabled = true);

                loadRequests('all');
                closeModal();
              });
          }
        });

      } else if (newStatus === "approved") {
        Swal.fire({
          title: "Are you sure?",
          html: "<span style='color: red; font-weight: bold;'>Once approved cannot be cancelled?</span>",
          icon: "question",
          showCancelButton: true,
          confirmButtonText: "Yes, approve it",
          cancelButtonText: "No"
        }).then((result) => {
          if (result.isConfirmed) {
            fetch(`/api/leave/update-status/${currentRequestId}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                status: newStatus,
                role: "admin"
              })
            })
              .then(res => res.json())
              .then(data => {
                Swal.fire("Approved!", data.message, "success");

                document.querySelectorAll(".approve-btn").forEach(btn => btn.disabled = true);
                document.querySelectorAll(".cancel-btn").forEach(btn => btn.disabled = true);

                loadRequests('all');
                viewRequest(currentRequestId);
              });
          }
        });
      }
    }

    function closeModal() {
      document.getElementById("viewModal").style.display = "none";
      currentRequestId = null;
    }

    // Close modal when clicking outside the content
    window.addEventListener("click", function (event) {
      const modal = document.getElementById("viewModal");
      if (event.target === modal) {
        closeModal();
      }
    })

    window.onload = () => {
      const leaveId = getQueryParam("leaveId");
      if (leaveId) {
        viewRequest(leaveId);
      } else {
        loadRequests('all');
      }
    };

  </script>
</body>

</html>
