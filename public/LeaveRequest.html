<!DOCTYPE html>

  <style>

      margin: 0;

      background-color: #c3e2d1;
    }

    .header {
      margin-bottom: 20px;
      /*  ADDED SPACING BELOW HEADER */
    }

    .header {
      background-color: #4aa382;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      height: 60px;
    }

    .header-left {
      display: flex;
      align-items: center;
    }

    .logo-box {
      background-color: white;
      color: black;
      font-weight: bold;
      font-size: 18px;
      padding: 6px 12px;
      border-radius: 4px;
      margin-right: 10px;
    }

    .worklife-text {
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header select {
      background-color: white;
      border: 1px solid white;
      color: black;
      padding: 4px 6px;
      border-radius: 4px;
    }

    .username {
      font-weight: 500;
    }

    .logout-btn {
      color: white;
      text-decoration: underline;
      background: none;
      border: none;
      cursor: pointer;
    }

    .main-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      gap: 30px;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      margin-top: 10px;
      font-size: 15px;
    }

    .left-panel button {
      width: 110px;
      height: 100px;
      padding: 10px;
      font-weight: bold;
      border: none;
      color: white;
      border-radius: 0px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .left-panel button:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }


    .left-panel .btn-hr {
      background-color: #a493b9;
    }

    .left-panel .btn-finance {
      background-color: #c78864;
    }

    .left-panel .btn-it {
      background-color: #863f33;
    }

    .left-panel .btn-pm {
      background-color: #15ac7f;
    }

    .left-panel .btn-reports {
      background-color: #82b435;
    }

    .btn-employee {
      background: #2e26c0;
      color: white;
    }


    .leave-form-section {

      background: white;
      padding: 20px;
      border-radius: 0px;

    .form-section h5 {
      font-weight: bold;
      color: #165c42;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px 20px;
    }

    .employee-task {
      margin-top: 25px;
    }

    .employee-task select {
      width: 100%;
      padding: 6px;
    }

    .employee-task table {
      background-color: #3bc290;
      border: 1px solid #389e7e;
      border-radius: 8px;
      overflow: hidden;
    }

    .employee-task th:first-child,
    .employee-task th:last-child {
      background-color: #55aa90;
      color: white;
    }

    .employee-task th,
    .employee-task td {
      padding: 10px;
      border: 1px solid #85b8a7;
    }

    .employee-task tbody td {
      background-color: #c6e6d9;
    }

    .employee-task select,
    .employee-task input {
      background-color: #f4fcf9;
      border: 1px solid #0e1110;
      padding: 6px;
      border-radius: 4px;
      width: 100%;
    }

    .employee-task table {
      border-collapse: separate;
      border-spacing: 0;
    }

    .employee-task table thead th:first-child {
      border-top-left-radius: 8px;
    }

    .employee-task table thead th:last-child {
      border-top-right-radius: 8px;
    }

    .form-control {
      border: 1px solid #797979;
    }

    .personal-info {
      flex: 1;
      background: white;
      padding: 16px;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
      min-width: 150px;
    }

    .info-heading {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #2db381;
    }

    .info-block {
      padding: 8px 12px;
      border-radius: 4px;
      margin: 4px 0;
      background-color: #e3f9f3;
    }

    }

    .info-block:nth-child(even) {

    }

    .label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

        gap: 10px;
        padding: 10px;
        width: 100%;
        align-items: flex-start;
      }

      .left-panel {

        gap: 0px;

      /* Smaller icons */

        border-radius: 6px;

      /* Make form SINGLE COLUMN */

        flex-direction: column;

      }

      .small-label {
        font-size: 12px;
        font-weight: bold;
      }

      }

      .radio-group {

        gap: 1px;
        font-size: 11px !important;
      }

      .radio-options {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .radio-option {
        display: flex;
        align-items: center;
        gap: 1px;
      }

      .leave-form-section input,

        margin-bottom: 6px;
      }

      .info-block {

        padding: 6px 8px;
      }
    }
  </style>
</head>

  <script>
    document.getElementById("leaveForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const form = document.getElementById("leaveForm");
      const formData = new FormData(form);

      const rows = document.querySelectorAll(".employee-task tbody tr");
      const assignments = [];

      rows.forEach(row => {
        const empSelect = row.querySelector("select.employee-select");
        const taskInput = row.querySelector("input");

        const empId = empSelect.value;
        const task = taskInput.value;

        if (empId && task) {
          assignments.push({
            assigned_employee_id: empId,
            task_description: task
          });
        }
      });

      formData.append("assignments", JSON.stringify(assignments));

      fetch("/api/leave/submit", {
        method: "POST",
        body: formData,
        credentials: "include"
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            Swal.fire({
              title: 'Success!',
              text: 'Leave request submitted!',
              icon: 'success',
              confirmButtonText: 'OK'
            }).then(() => {
              form.reset(); // clear form after user clicks OK
            });
          } else {
            Swal.fire({
              title: 'Error!',
              text: data.message,
              icon: 'error',
              confirmButtonText: 'OK'
            });
          }
        })
        .catch(err => {
          console.error(" Fetch error:", err);
          Swal.fire({
            title: 'Oops!',
            text: 'Something went wrong.',
            icon: 'warning',
            confirmButtonText: 'OK'
          });
        });
    });

    // employee dropdown based on department
    document.addEventListener("DOMContentLoaded", () => {
      fetch("/api/leave/by-department")
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            const dropdowns = document.querySelectorAll(".employee-select");
            const options = data.employees.map(emp =>
              `<option value="${emp.employee_id}">${emp.name}</option>`
            ).join("");

            dropdowns.forEach(select => {
              select.innerHTML += options;
            });
          } else {
            console.warn(data.message || "Employee list fetch failed");
          }
        })
        .catch(err => {
          console.error("Failed to load employees:", err);
        });
    });





    // onclick buttons
    document.addEventListener("DOMContentLoaded", () => {

      document.getElementById("itBtn")

      document.getElementById("reportsBtn")
        ?.addEventListener("click", () => window.location.href = "humanresource.html?section=reports-logo");

    });
  </script>

    //  Function to load personal info dynamically into your .personal-info box
    function loadPersonalInfo() {
      fetch("/api/leave/personalinfo", { credentials: "include" })
        .then(res => res.json())
        .then(info => {
          console.log("info", info)
          if (info.error) {
            console.error("No personal info:", info.error);
            return;
          }

          // Prepare your blocks
          const infoBlocks = [
            { label: "Employee Id:", value: info.employee_id },
            { label: "Name:", value: info.requester_name },
            { label: "My Email:", value: info.email_id },
            { label: "Company:", value: info.company },
            { label: "Department:", value: info.department },
            { label: "Designation:", value: info.designation },
            { label: "Line Manager:", value: info.line_manager },
            { label: "Joining Date:", value: info.joining_date ? new Date(info.joining_date).toLocaleDateString() : "-" },
          ];

          // Inject into container
          const container = document.querySelector(".personal-info");
          container.innerHTML = `
          <h6 class="info-heading">Personal Information:</h6>
          ${infoBlocks.map(block => `
            <div class="info-block">
              <span class="label">${block.label}</span>
              <div>${block.value || "-"}</div>
            </div>
          `).join("")}
        `;
        })
        .catch(err => console.error("Fetch error:", err));
    }



    // logout
    function logoutUser() {
      Swal.fire({
        title: "Are you sure?",
        text: "You will be logged out from your session.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Yes, logout",
        cancelButtonText: "Cancel"
      }).then((result) => {
        if (result.isConfirmed) {
          fetch("/api/auth/logout")
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                Swal.fire({
                  title: "Logged Out!",
                  text: "You have been successfully logged out.",
                  icon: "success",
                  showConfirmButton: false,
                  timer: 2000
                });

                setTimeout(() => {
                  window.location.href = "index.html";
                }, 2000);
              } else {
                Swal.fire("Oops!", "Logout failed. Try again.", "error");
              }
            })
            .catch(err => {
              console.error("Logout error:", err);
              Swal.fire("Error", "Something went wrong. Try again.", "error");
            });
        }
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
