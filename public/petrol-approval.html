<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Petrol Approval</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- SweetAlert2 for logout -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* -----------------------------------
        Global
       ----------------------------------- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #dff5e4, #f8fffb, #e0f2df);
            background-size: cover;
            background-attachment: fixed;
            color: #333;
        }

        /* -----------------------------------
        Header
        ----------------------------------- */
        .header {
            background: linear-gradient(90deg, #3a9d79, #52af8d);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            height: 56px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .logo-box {
            background-color: #ffffff;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            padding: 6px 14px;
            border-radius: 8px;
            margin-right: 12px;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.15);
        }

        .worklife-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header select {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            background-color: white;
            color: #444;
            font-weight: 600;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.15);
        }

        .profile {
            font-weight: bold;
        }

        .logout {
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout:hover {
            color: #ffe6e6;
        }

        /* -----------------------------------
         Layout
        ----------------------------------- */
        .main {
            display: flex;
            padding-top: 10px;
        }

        .left-panel {
            width: 110px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        /* -----------------------------------
        Left Panel Buttons
        ----------------------------------- */
        .left-panel button {
            width: 95px;
            height: 95px;
            border: none;
            border-radius: 0px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .left-panel button:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }

        .left-panel i {
            font-size: 28px;
            margin-bottom: 6px;
        }

        /* Button Colors */
        .btn-hr {
            background-color: #7f6aa8;
        }

        .btn-finance {
            background-color: #cb7e56;
        }

        .btn-it {
            background-color: #773631;
        }

        .btn-pm {
            background-color: #138f6c;
        }

        .btn-reports {
            background-color: #71a92c;
        }

        /* -----------------------------------
        Content Area
       ----------------------------------- */
        .content {
            flex: 1;
            padding: 30px;
            background-color: #ffffff;
            margin: 10px 10px 10px 0px;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .content h1 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #52af8d;
            font-weight: bold;
        }

        /* -----------------------------------
        Status Buttons
        ----------------------------------- */
        .status-buttons button {
            background: #ffffff;
            border: 2px solid #d0d0d0;
            padding: 6px 14px;
            margin-right: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 95px;
            /* perfect medium size */
        }


        .status-buttons button:hover {
            background-color: #5654ce;
            color: #fff;
            border-color: #3a9d79;
        }

        /* -----------------------------------
        Table
        ----------------------------------- */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            background-color: #3a9d79;
            color: white;
            padding: 10px;
            font-size: 15px;
            border-right: 1px solid #dcdcdc;
        }

        td {
            background-color: #ffffff;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            border-right: 1px solid #5dbd98;
        }

        tr:hover td {
            background-color: #e4f3eb;
        }

        /* ============================
          STATUS TAGS
        ============================ */
        .status-box {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
            display: inline-block;
        }

        .status-box.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-box.approved {
            background: #d4edda;
            color: #155724;
        }

        .status-box.rejected {
            background: #f8d7da;
            color: #721c24;
        }

        /* -----------------------------------
        Action Icons
        ----------------------------------- */
        .action-icons {
            display: flex;
            gap: 12px;
        }

        /* Action Icon */
        .icon-box {
            display: inline-flex;
            background: #173E9A;
            color: white;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
        }

        .icon-box:hover {
            transform: scale(1.1);
        }

        .icon-box.view:hover {
            background-color: #3a9d79;
            color: white;
        }

        .icon-box.delete:hover {
            background-color: #dc3545;
            color: white;
        }

        /* -----------------------------------
        Modal
       ----------------------------------- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #ffffff;
            width: 480px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }

        .close-btn i {
            color: red;
        }

        .modal-content button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .approve-btn {
            background-color: #28a745;
            color: white;
        }

        .cancel-btn {
            background-color: #dc3545;
            color: white;
        }

        button:disabled {
            background-color: #bbb !important;
            cursor: not-allowed;
            opacity: 0.7;
        }








        /* ============================
        TOP FILTER BAR (DATE + REPORT)
        ============================ */
        .top-filter-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 15px;
        }

        .top-right-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Date Button */
        .date-btn {
            background: #173E9A;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Report Button */
        .report-btn {
            background: white;
            border: 1px solid #173E9A;
            color: #173E9A;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ============================
        STATUS BUTTONS + SEARCH ROW
        ============================ */
        .status-search-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        /* Search Box */
        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 8px 36px 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 200px;
        }

        /* Search Icon */
        .search-icon {
            position: absolute;
            right: 10px;
            top: 9px;
            font-size: 14px;
            color: gray;
        }

        /* Clear "X" */
        .clear-search {
            position: absolute;
            right: 28px;
            top: 3px;
            font-size: 20px;
            cursor: pointer;
            color: #666;
            display: none;
        }

        /* ============================
        POPUP OVERLAY
        ============================ */
        .popup-overlay {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.45);
            z-index: 9999;
        }

        /* Popup Box */
        .popup-box {
            width: 320px;
            background: white;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .popup-box h3 {
            margin: 0 0 12px;
            color: #0b0b0c;
            font-size: 18px;
        }

        /* Popup Inputs */
        .popup-box label {
            font-size: 14px;
            margin-bottom: 4px;
            display: block;
            color: #173E9A;
            font-weight: bold;
        }

        .popup-box input[type=date] {
            width: 93%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 12px;
        }

        /* Popup Buttons */
        .popup-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .apply-btn {
            background: #173E9A;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }



        /* FULL TOOLBAR ROW */
        .filter-toolbar {
            display: flex;
            justify-content: space-between;
            /* left & right */
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            gap: 20px;
        }

        /* RIGHT SIDE GROUP */
        .right-side-tools {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* STATUS BUTTONS */
        .status-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>

    </style>
</head>

<body>

    <!-- === HEADER === -->
    <header>
        <div class="header">
            <!-- Left -->
            <div class="header-left" id="headerLogo">
                <div class="logo-box">WL</div>
                <div class="worklife-text">Worklife</div>
            </div>
            <!-- Right -->
            <div class="header-right">
                <select>
                    <option>Eastern</option>
                    <option>Western</option>
                    <option>Northern</option>
                    <option>Southern</option>
                </select>
                <span>English</span>
                <div class="profile">
                    <i class="fa-solid fa-circle-user"></i>
                    <span id="userName" style="text-transform: capitalize;">Loading...</span>
                </div>
                <div class="logout" id="logoutBtn">
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- === MAIN === -->
    <div class="main">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <button class="btn-hr" id="hrBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-regular fa-user"></i>
                    <span>HR</span>
                </div>
            </button>
            <button class="btn-finance" id="financeBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-regular fa-folder"></i>
                    <span>Finance</span>
                </div>
            </button>
            <button class="btn-it" id="itBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-solid fa-desktop"></i>
                    <span>IT</span>
                </div>
            </button>
            <button class="btn-pm" id="performanceBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-solid fa-clock"></i>
                    <span>Performance</span>
                </div>
            </button>
            <button class="btn-reports" id="reportsBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-solid fa-chart-bar"></i>
                    <span>Reports</span>
                </div>
            </button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <h1>Petrol Conveyance</h1>


            <!-- STATUS BUTTONS, date, generate xcel, search -->
            <div class="filter-toolbar">

                <!-- LEFT: STATUS BUTTONS -->
                <div class="status-buttons">
                    <button id="allBtn">All</button>
                    <button id="approvedBtn">Approved</button>
                    <button id="pendingBtn">Pending</button>
                    <button id="rejectedBtn">Rejected</button>
                </div>

                <!-- RIGHT: DATE, REPORT, SEARCH -->
                <div class="right-side-tools">
                    <button id="petrolDateBtn" class="date-btn"></button>
                    <button id="petrolReportBtn" class="report-btn">Generate Report</button>

                    <div class="search-box">
                        <input type="text" id="petrolSearch" placeholder="Search by name…" maxlength="40">
                        <i class="fa fa-search search-icon"></i>
                        <span id="clearPetrolSearch" class="clear-search">×</span>
                    </div>
                </div>

            </div>


            <!-- open popup to enter date -->
            <div id="petrolDatePopup" class="popup-overlay">
                <div class="popup-box">
                    <h3>Select Date Range</h3>

                    <label>Start Date</label>
                    <input type="date" id="petrolStartDate">

                    <label>End Date</label>
                    <input type="date" id="petrolEndDate">

                    <div class="popup-actions">
                        <button id="applyPetrolDate" class="apply-btn">Apply</button>
                        <button id="cancelPetrolDate" class="cancel-btn">Cancel</button>
                    </div>
                </div>
            </div>


            <table id="approvalTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Remarks</th>
                        <th>Status</th>
                        <th>Final Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data rows will be injected here -->
                </tbody>
            </table>


            <!-- PETROL VIEW MODAL -->
            <div class="modal" id="petrolModal">
                <div class="modal-content">
                    <span class="close-btn" id="closeModalBtn">
                        <i class="fa-solid fa-rectangle-xmark"></i>
                    </span>
                    <h3>Petrol Claim Details <span id="petrolStatusTag" class="status-box small">Status</span></h3>

                    <!-- Claim Info -->
                    <div id="petrolDetails">
                        <p><strong>Requester Name:</strong> <span id="viewRequesterName"></span></p>
                        <p><strong>Requester No:</strong> <span id="viewRequesterNo"></span></p>
                        <p><strong>Email:</strong> <span id="viewEmail"></span></p>
                        <p><strong>Date:</strong> <span id="viewDate"></span></p>
                        <p><strong>Department:</strong> <span id="viewDepartment"></span></p>
                        <p><strong>Remarks:</strong> <span id="viewRemarks"></span></p>
                    </div>

                    <!-- Items Table -->
                    <h4>Petrol Items</h4>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Start KM</th>
                                <th>End KM</th>
                                <th>Total KM</th>
                                <th>Location</th>
                            </tr>
                        </thead>
                        <tbody id="petrolItemsTableBody"></tbody>
                    </table>

                    <!-- Approve / Reject Buttons -->
                    <button id="approveBtn" class="approve-btn" id="approveBtn">Approve</button>
                    <button id="rejectBtn" class="cancel-btn" id="rejectBtn">Reject</button>
                    <p id="approvalMessage" style="display:none; color:red; font-weight: bold; margin-top: 10px;"></p>
                </div>
            </div>


            <script>
                let petrolFilter = {
                    status: "all",
                    search: "",
                    start_date: "",
                    end_date: ""
                };

                // LOAD FROM BACKEND
                function loadPetrolClaims() {
                    let url = "/api/petrol/claims";
                    const params = new URLSearchParams();

                    if (petrolFilter.status !== "all") params.append("status", petrolFilter.status);
                    if (petrolFilter.search) params.append("search", petrolFilter.search);
                    if (petrolFilter.start_date) params.append("start_date", petrolFilter.start_date);
                    if (petrolFilter.end_date) params.append("end_date", petrolFilter.end_date);

                    if (params.toString()) url += "?" + params.toString();

                    fetch(url)
                        .then(res => res.json())
                        .then(data => renderPetrolTable(data));
                }

                // RENDER TABLE
                function renderPetrolTable(list) {
                    const tbody = document.querySelector("#approvalTable tbody");
                    tbody.innerHTML = "";

                    if (!list.length) {
                        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No Records Found</td></tr>`;
                        return;
                    }

                    list.forEach((row, i) => {
                        const tr = document.createElement("tr");

                        tr.innerHTML = `
                        <td>${i + 1}</td>
                        <td>${row.requester_name}</td>
                        <td>${row.remarks}</td>
                        <td><span class="status-box ${row.my_status.toLowerCase()}">${row.my_status}</span></td>
                        <td><span class="status-box ${row.final_status.toLowerCase()}">${row.final_status}</span></td>
                        `;

                        const actionTd = document.createElement("td");

                        const viewBtn = document.createElement("div");
                        viewBtn.className = "icon-box view";
                        viewBtn.innerHTML = `<i class="fas fa-eye"></i>`;

                        viewBtn.addEventListener("click", () => {
                            viewPetrol(row.req_no);
                        });

                        actionTd.appendChild(viewBtn);
                        tr.appendChild(actionTd);

                        tbody.appendChild(tr);
                    });
                }

                // STATUS FILTER
                function filterPetrolTable(status) {
                    petrolFilter.status = status;
                    loadPetrolClaims();
                }

                // SEARCH FILTER
                document.getElementById("petrolSearch").addEventListener("input", function () {
                    let v = this.value;

                    if (!/^[A-Za-z\s]*$/.test(v)) return;

                    petrolFilter.search = v.trim();
                    document.getElementById("clearPetrolSearch").style.display = v ? "block" : "none";

                    loadPetrolClaims();
                });

                document.getElementById("clearPetrolSearch").onclick = () => {
                    petrolFilter.search = "";
                    document.getElementById("petrolSearch").value = "";
                    document.getElementById("clearPetrolSearch").style.display = "none";
                    loadPetrolClaims();
                };

                // DATE POPUP
                document.getElementById("petrolDateBtn").onclick = () => {
                    document.getElementById("petrolDatePopup").style.display = "flex";
                };

                document.getElementById("cancelPetrolDate").onclick = () => {
                    document.getElementById("petrolDatePopup").style.display = "none";
                };

                document.getElementById("applyPetrolDate").onclick = () => {
                    petrolFilter.start_date = document.getElementById("petrolStartDate").value;
                    petrolFilter.end_date = document.getElementById("petrolEndDate").value;

                    document.getElementById("petrolDatePopup").style.display = "none";
                    loadPetrolClaims();
                };

                document.getElementById("closeModalBtn")
                    ?.addEventListener("click", closePetrolModal);

                // REPORT BUTTON
                document.getElementById("petrolReportBtn").onclick = () => {
                    let url = "/api/petrol/claims?report=1";

                    if (petrolFilter.status !== "all") url += `&status=${petrolFilter.status}`;
                    if (petrolFilter.search) url += `&search=${petrolFilter.search}`;
                    if (petrolFilter.start_date) url += `&start_date=${petrolFilter.start_date}`;
                    if (petrolFilter.end_date) url += `&end_date=${petrolFilter.end_date}`;

                    window.location = url;
                };

                // SET TODAY'S DATE — 24 November 2025
                (function setToday() {
                    const btn = document.getElementById("petrolDateBtn");
                    const t = new Date();
                    btn.innerText = `${t.getDate()} ${t.toLocaleString("en-US", { month: "long" })} ${t.getFullYear()}`;
                })();



                // // filter table by buttons
                // function filterPetrolTable(status) {
                //     const tbody = document.querySelector("#approvalTable tbody");
                //     const rows = tbody.querySelectorAll("tr");

                //     rows.forEach(row => {
                //         const statusCell = row.querySelector("td:nth-child(4) span.status-box");
                //         if (!statusCell) return; // safety check

                //         const rowStatus = statusCell.textContent.trim().toLowerCase();
                //         if (status === 'all' || rowStatus === status.toLowerCase()) {
                //             row.style.display = "";  // show row
                //         } else {
                //             row.style.display = "none";  // hide row
                //         }
                //     });
                // }


                // view pop-up form for approve or reject
                function viewPetrol(reqNo) {
                    currentPetrolRequestId = reqNo;

                    fetch(`/api/petrol/claims/${reqNo}`, { credentials: "include" })
                        .then(res => res.json())
                        .then(data => {
                            // Fill Claim Details
                            document.getElementById("viewRequesterName").textContent = data.requester_name || "-";
                            document.getElementById("viewRequesterNo").textContent = data.requester_no || "-";
                            document.getElementById("viewEmail").textContent = data.email || "-";
                            document.getElementById("viewDate").textContent = data.date || "-";
                            document.getElementById("viewDepartment").textContent = data.department || "-";
                            document.getElementById("viewRemarks").textContent = data.remarks || "-";

                            // Status Tag
                            const statusTag = document.getElementById("petrolStatusTag");
                            const claimStatus = data.status || data.status || "Pending";
                            statusTag.textContent = claimStatus;
                            statusTag.className = "status-box small " + claimStatus.toLowerCase();

                            // Petrol Items Table
                            const itemsBody = document.getElementById("petrolItemsTableBody");
                            itemsBody.innerHTML = "";
                            if (data.items && data.items.length > 0) {
                                data.items.forEach(item => {
                                    const row = `<tr>
                                    <td>${item.date}</td>
                                    <td>${item.start_km}</td>
                                    <td>${item.end_km}</td>
                                    <td>${item.total_km}</td>
                                    <td>${item.location}</td>
                                    </tr>`;
                                    itemsBody.innerHTML += row;
                                });
                            } else {
                                itemsBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No items</td></tr>`;
                            }

                            // Approve/Reject buttons and message
                            const approveBtn = document.getElementById("approveBtn");
                            const rejectBtn = document.getElementById("rejectBtn");
                            const approvalMessage = document.getElementById("approvalMessage");

                            const myStatus = (data.approval_status || "pending").toLowerCase();

                            if (myStatus === "approved") {
                                approveBtn.disabled = true;
                                rejectBtn.disabled = true;
                                approvalMessage.style.display = "block";
                                approvalMessage.style.color = "green";
                                approvalMessage.textContent = "You have already approved this request.";
                            } else if (myStatus === "rejected") {
                                approveBtn.disabled = true;
                                rejectBtn.disabled = true;
                                approvalMessage.style.display = "block";
                                approvalMessage.style.color = "red";
                                approvalMessage.textContent = "You have already rejected this request.";
                            } else if (myStatus === "pending") {
                                approveBtn.disabled = false;
                                rejectBtn.disabled = false;
                                approvalMessage.style.display = "none";
                            }
                            // Show modal
                            document.getElementById("petrolModal").style.display = "flex";
                        })
                        .catch(err => {
                            console.error("Error fetching petrol claim:", err);
                            Swal.fire("Error", "Unable to load petrol claim details.", "error");
                        });
                }

                // Approve/Reject handler
                function updatePetrolStatus(newStatus) {
                    if (!currentPetrolRequestId) return;

                    const handleFetch = (comments = "") => {
                        const approveBtn = document.getElementById("approveBtn");
                        const rejectBtn = document.getElementById("rejectBtn");
                        const approvalMessage = document.getElementById("approvalMessage");

                        // Disable buttons immediately after click
                        approveBtn.disabled = true;
                        rejectBtn.disabled = true;
                        approvalMessage.style.display = "block";
                        approvalMessage.style.color = newStatus === "approved" ? "green" : "red";
                        approvalMessage.textContent = newStatus === "approved"
                            ? "You have approved this request."
                            : "You have rejected this request.";


                        fetch(`/api/petrol/approval/update`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            credentials: "include", // ✅ ensures session is sent
                            body: JSON.stringify({
                                req_no: currentPetrolRequestId,
                                status: newStatus,
                                comments,
                                role: "admin",
                                approver_id: sessionStorage.getItem("user_id")
                            })
                        })
                            .then(res => res.json())
                            .then(data => {
                                Swal.fire(
                                    newStatus === "approved" ? "Approved!" : "Rejected!",
                                    data.message,
                                    "success"
                                );
                                loadPetrolClaims();
                                viewPetrol(currentPetrolRequestId);
                            })
                            .catch(err => {
                                Swal.fire("Error", "Something went wrong", "error");
                                // If error, re-enable buttons so user can try again
                                approveBtn.disabled = false;
                                rejectBtn.disabled = false;
                            });
                    };

                    if (newStatus === "rejected") {
                        Swal.fire({
                            title: "Reason for rejection",
                            input: "text",
                            inputLabel: "Rejection Reason",
                            inputPlaceholder: "Enter reason here...",
                            inputValidator: value => !value?.trim() ? "Reason required!" : null,
                            showCancelButton: true
                        }).then(result => {
                            if (result.isConfirmed) handleFetch(result.value);
                        });
                    } else {
                        Swal.fire({
                            title: "Approve petrol claim?",
                            text: "Once approved, cannot be reverted.",
                            icon: "question",
                            showCancelButton: true,
                            confirmButtonText: "Approve"
                        }).then(result => {
                            if (result.isConfirmed) handleFetch();
                        });
                    }
                }
                // closing of popup by clicking outside also
                function closePetrolModal() {
                    document.getElementById("petrolModal").style.display = "none";
                }

                // Close when clicking outside the modal content
                const petrolModal = document.getElementById("petrolModal");
                petrolModal.addEventListener("click", function (event) {
                    // If the clicked target is the modal itself (background), close it
                    if (event.target === petrolModal) {
                        closePetrolModal();
                    }
                });

                document.addEventListener("DOMContentLoaded", () => {
                    loadPetrolClaims();

                    const reqNo = new URLSearchParams(window.location.search).get("reqNo");
                    if (reqNo) {
                        setTimeout(() => {
                            viewPetrol(reqNo);
                        }, 300);
                    }
                });



                // onclick
                document.addEventListener("DOMContentLoaded", () => {

                    console.log("Petrol page ready ✅");

                    // ==========================
                    // HEADER
                    // ==========================
                    document.getElementById("headerLogo")?.addEventListener("click", () => {
                        location.href = "dashboard.html";
                    });

                    // ==========================
                    // LOGOUT
                    // ==========================
                    document.getElementById("logoutBtn")?.addEventListener("click", logoutUser);

                    // ==========================
                    // SIDEBAR
                    // ==========================
                    document.getElementById("hrBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=hr-logo");
                    document.getElementById("financeBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=finance-logo");
                    document.getElementById("itBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=it-logo");
                    document.getElementById("performanceBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=performance-logo");
                    document.getElementById("reportsBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=reports-logo");

                    // ==========================
                    // STATUS FILTERS
                    // ==========================
                    document.getElementById("allBtn")?.addEventListener("click", () => filterPetrolTable("all"));
                    document.getElementById("approvedBtn")?.addEventListener("click", () => filterPetrolTable("approved"));
                    document.getElementById("pendingBtn")?.addEventListener("click", () => filterPetrolTable("pending"));
                    document.getElementById("rejectedBtn")?.addEventListener("click", () => filterPetrolTable("rejected"));

                    // ==========================
                    // DATE POPUP
                    // ==========================
                    document.getElementById("petrolDateBtn")?.addEventListener("click", () => {
                        document.getElementById("petrolDatePopup").style.display = "flex";
                    });

                    document.getElementById("cancelPetrolDate")?.addEventListener("click", () => {
                        document.getElementById("petrolDatePopup").style.display = "none";
                    });

                    document.getElementById("applyPetrolDate")?.addEventListener("click", () => {
                        petrolFilter.start_date = document.getElementById("petrolStartDate").value;
                        petrolFilter.end_date = document.getElementById("petrolEndDate").value;
                        document.getElementById("petrolDatePopup").style.display = "none";
                        loadPetrolClaims();
                    });

                    // ==========================
                    // REPORT
                    // ==========================
                    document.getElementById("petrolReportBtn")?.addEventListener("click", () => {
                        let url = "/api/petrol/claims?report=1";

                        if (petrolFilter.status !== "all") url += `&status=${petrolFilter.status}`;
                        if (petrolFilter.search) url += `&search=${petrolFilter.search}`;
                        if (petrolFilter.start_date) url += `&start_date=${petrolFilter.start_date}`;
                        if (petrolFilter.end_date) url += `&end_date=${petrolFilter.end_date}`;

                        window.location = url;
                    });

                    // ==========================
                    // APPROVE / REJECT
                    // ==========================
                    document.getElementById("approveBtn")?.addEventListener("click", () => {
                        updatePetrolStatus("approved");
                    });

                    document.getElementById("rejectBtn")?.addEventListener("click", () => {
                        updatePetrolStatus("rejected");
                    });

                    // ==========================
                    // INITIAL LOAD
                    // ==========================
                    loadPetrolClaims();
                });

            </script>
            <script>
                fetch("/api/auth/session-check", {
                    credentials: "include"
                })
                    .then(res => res.json())
                    .then(data => {
                        if (!data.loggedIn) {
                            // Not logged in → go to login
                            window.location.href = "index.html";
                        } else {
                            document.getElementById("userName").textContent = data.user.name;
                            sessionStorage.setItem("user_id", data.user.user_id);

                            // ✅ ADD THIS PART
                            if (data.user.roleId === 4) {   // 4 = Employee
                                const panel = document.querySelector(".left-panel");
                                if (panel) {
                                    panel.style.display = "none";
                                }
                            }
                        }
                    })
                    .catch(error => {
                        console.error("Session check failed:", error);
                        window.location.href = "index.html";
                    });



                // logout
                function logoutUser() {
                    Swal.fire({
                        title: "Are you sure?",
                        text: "You will be logged out from your session.",
                        icon: "warning",
                        showCancelButton: true,
                        confirmButtonColor: "#3085d6",
                        cancelButtonColor: "#d33",
                        confirmButtonText: "Yes, logout",
                        cancelButtonText: "Cancel"
                    }).then((result) => {
                        if (result.isConfirmed) {
                            // Call logout API
                            fetch("/api/auth/logout")
                                .then(res => res.json())
                                .then(data => {
                                    if (data.success) {
                                        Swal.fire({
                                            title: "Logged Out!",
                                            text: "You have been successfully logged out.",
                                            icon: "success",
                                            showConfirmButton: false,
                                            timer: 2000
                                        });

                                        setTimeout(() => {
                                            window.location.href = "index.html"; // Redirect to login
                                        }, 2000);
                                    } else {
                                        Swal.fire("Oops!", "Logout failed. Try again.", "error");
                                    }
                                })
                                .catch(err => {
                                    console.error("Logout error:", err);
                                    Swal.fire("Error", "Something went wrong. Try again.", "error");
                                });
                        }
                    });
                }
            </script>
</body>
