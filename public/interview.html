<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>2nd Round Interview – Worklife</title>

    <!-- Tailwind CDN -->
    <link rel="stylesheet" href="/output.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- SweetAlert -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <!-- mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .invite-container {
            width: 100%;
            margin-top: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 16px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-align: left;
        }

        .form-control {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            width: 95%;
            outline: none;
        }

        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* SweetAlert button improvements */
        .swal2-confirm {
            background-color: #6366f1 !important;
            border-radius: 6px !important;
        }

        .swal2-cancel {
            background-color: #6b7280 !important;
            border-radius: 6px !important;
        }
    </style>
</head>

<body class="bg-[#c3e2d1] font-[Roboto]">

    <!-- ================= HEADER ================= -->
    <header class="bg-[#52af8d] text-white
           flex items-center justify-between
           h-[44px] md:h-[60px]
           px-2 md:px-4">

        <!-- Left -->
        <div class="flex items-center cursor-pointer" id="goHR">

            <div class="bg-white text-black font-bold
                   text-xs md:text-lg
                   px-2 md:px-3
                   py-0.5 md:py-1
                   rounded
                   mr-1 md:mr-2">
                WL
            </div>

            <div class="font-bold text-sm md:text-xl">
                Worklife
            </div>
        </div>

        <!-- Right -->
        <div class="flex items-center
               gap-2 md:gap-3
               text-xs md:text-sm">

            <select class="text-black
                   text-xs md:text-sm
                   px-1 md:px-2
                   py-0.5 md:py-1
                   rounded">
                <option>Eastern</option>
                <option>Western</option>
                <option>Northern</option>
                <option>Southern</option>
            </select>

            <!-- Hide English ONLY on very small screens -->
            <span class="hidden sm:inline">
                English
            </span>

            <div class="flex items-center gap-1">
                <i class="fa-solid fa-circle-user text-sm md:text-base"></i>
                <span id="userName" class="text-xs md:text-sm">
                    Loading...
                </span>
            </div>

            <i class="fa-solid fa-power-off
                   cursor-pointer
                   text-sm md:text-base">
            </i>
        </div>
    </header>


    <!-- ================= MAIN ================= -->
    <div class="max-w-[1400px] flex flex-col md:flex-row gap-4 md:gap-8 p-4 md:p-6">

        <!-- LEFT PANEL -->
        <div
            class="flex flex-row md:flex-col justify-center md:justify-start items-center w-full md:w-[120px] shrink-0 gap-0 order-first md:order-none">


            <!-- HR -->
            <button id="hrBtn" class="w-[55px] h-[55px]
           md:w-[110px] md:h-[100px]
           p-[6px] md:p-0
           bg-[#a493b9] text-white
           flex flex-col justify-center items-center
           hover:-translate-y-1 hover:shadow-xl transition">

                <i class="fa-regular fa-user text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">HR</span>
            </button>

            <!-- Finance -->
            <button id="financeBtn" class="w-[55px] h-[55px]
           md:w-[110px] md:h-[100px]
           p-[6px] md:p-0
           bg-[#c78864] text-white
           flex flex-col justify-center items-center
           hover:-translate-y-1 hover:shadow-xl transition">

                <i class="fa-regular fa-folder text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">Finance</span>
            </button>

            <!-- IT -->
            <button id="itBtn" class="w-[55px] h-[55px]
           md:w-[110px] md:h-[100px]
           p-[6px] md:p-0
           bg-[#863f33] text-white
           flex flex-col justify-center items-center
           hover:-translate-y-1 hover:shadow-xl transition">

                <i class="fa-solid fa-desktop text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">IT</span>
            </button>

            <!-- Performance -->
            <button id="performanceBtn" class="w-[55px] h-[55px]
           md:w-[110px] md:h-[100px]
           p-[6px] md:p-0
           bg-[#15ac7f] text-white
           flex flex-col justify-center items-center
           hover:-translate-y-1 hover:shadow-xl transition">

                <i class="fa-solid fa-clock text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">Performance</span>
            </button>

            <!-- Reports -->
            <button id="reportsBtn" class="w-[55px] h-[55px]
           md:w-[110px] md:h-[100px]
           p-[6px] md:p-0
           bg-[#82b435] text-white
           flex flex-col justify-center items-center
           hover:-translate-y-1 hover:shadow-xl transition">

                <i class="fa-solid fa-chart-bar text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">Reports</span>
            </button>

        </div>



        <!-- ================= RIGHT CONTENT ================= -->
        <div class="flex-1 bg-white p-3 md:p-4 border border-gray-400">

            <!-- TOP BAR -->
            <div class="flex flex-col md:flex-row gap-3 md:justify-between md:items-center mb-3">

                <h2 class="text-lg gap-8 text-green-800 font-bold"><i class="fa-solid fa-envelope"></i> 2nd Round
                    Interview</h2>

                <div class="flex gap-3 md:gap-2 items-center">

                    <!-- SEARCH -->
                    <input type="text" id="searchInput" placeholder="Search by Name" class="border border-gray-400 w-[110px] sm:w-[140px] 
                    md:w-[200px] px-2 py-0.5 text-xs md:text-sm outline-none" onkeyup="searchTable()" />

                    <!-- SEND INVITE -->
                    <button id="sendInviteBtn"
                        class="border border-gray-400 px-3 py-1 text-sm bg-[#4a5d73] text-white hover:bg-[#0e6655]">
                        Send Invite
                    </button>

                    <!-- PRINT -->
                    <button id="printBtn"
                        class="border border-gray-400 px-3 py-1 text-sm bg-[#f2f2f2] hover:bg-[#e5e5e5]">
                        <i class="fa-solid fa-print"></i>
                    </button>

                </div>
            </div>


            <!-- TABLE -->
            <div class="overflow-x-auto">
                <table id="interviewTable"
                    class="min-w-[900px] w-full border border-gray-400 text-sm bg-white text-center">

                    <!-- TABLE HEADER -->
                    <thead class="bg-[#52af8d] text-white">
                        <tr>
                            <th class="border border-gray-400 px-3 py-2">SL No</th>
                            <th class="border border-gray-400 px-3 py-2">Candidate Name</th>
                            <th class="border border-gray-400 px-3 py-2">Role</th>
                            <th class="border border-gray-400 px-3 py-2">Score</th>
                            <th class="border border-gray-400 px-3 py-2">Status</th>
                            <th class="border border-gray-400 px-3 py-2">Decision</th>
                            <th class="border border-gray-400 px-3 py-2">Action</th>
                        </tr>
                    </thead>

                    <!-- TABLE BODY -->
                    <tbody id="interviewTableBody">
                        <!-- Data will be injected from JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        function sendInvite() {
            Swal.fire({
                title: 'Send Interview Link',
                html: `
                <div class="invite-container">

                    <div class="form-group">
                        <label>Role</label>
                        <select id="roleSelect" class="form-control">
                            <option value="">Select Role</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Candidate Email</label>
                        <input 
                        id="emailInput" 
                        type="email" 
                        class="form-control"
                        placeholder="candidate@gmail.com">
                    </div>

                </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Send',
                focusConfirm: false,

                didOpen: () => {
                    loadRoles(); // ⭐ THIS WAS MISSING
                },

                preConfirm: () => {
                    const role = document.getElementById('roleSelect').value;
                    const email = document.getElementById('emailInput').value;

                    if (!role) {
                        Swal.showValidationMessage('Please select a role');
                        return false;
                    }
                    if (!email) {
                        Swal.showValidationMessage('Please enter candidate email');
                        return false;
                    }

                    return { role, email };
                }
            }).then((result) => {
                if (result.isConfirmed) {

                    fetch("/api/interview/invite", {
                        method: "POST",
                        credentials: "include",   // IMPORTANT
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            role_id: result.value.role,
                            email: result.value.email
                        })
                    })
                        .then(res => res.json())
                        .then(data => {
                            Swal.fire(
                                "Success",
                                "Interview invite created successfully",
                                "success"
                            );
                            console.log("Server response:", data);
                        })
                        .catch(err => {
                            console.error("Invite error:", err);
                            Swal.fire("Error", "Something went wrong", "error");
                        });
                }
            });
        }


        // search bar
        function searchTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.querySelectorAll("#interviewTable tbody tr");

            rows.forEach(row => {
                const name = row.cells[1].innerText.toLowerCase();
                row.style.display = name.includes(input) ? "" : "none";
            });
        }


        // Roles dropdown
        function loadRoles() {
            fetch("/api/roles", {
                method: "GET",
                credentials: "include" // ⭐ VERY IMPORTANT
            })
                .then(res => res.json())
                .then(data => {
                    const roleSelect = document.getElementById("roleSelect");
                    roleSelect.innerHTML = `<option value="">Select Role</option>`;

                    data.forEach(role => {
                        roleSelect.innerHTML += `
            <option value="${role.role_id}">
              ${role.role_name}
            </option>`;
                    });
                })
                .catch(err => {
                    console.error("Failed to load roles:", err);
                });
        }


        // table data for HR
        function loadInterviewTable() {
            fetch("/api/interview/list", {
                method: "GET",
                credentials: "include"
            })
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById("interviewTableBody");
                    tbody.innerHTML = "";

                    data.forEach((row, index) => {

                        const decisionDisabled = row.decision ? true : false;
                        const decisionText = row.decision || "Select";

                        const tr = document.createElement("tr");
                        tr.className = "hover:bg-[#c3e2d1]";

                        tr.innerHTML = `
    <td class="border px-3 py-2">${index + 1}</td>
    <td class="border px-3 py-2">${row.candidate_email}</td>
    <td class="border px-3 py-2">${row.role_name}</td>
    <td class="border px-3 py-2 text-center">
      ${row.score !== null ? row.score : "-"}
    </td>
    <td class="border px-3 py-2 font-medium">
      ${row.status}
    </td>
    <td class="border px-3 py-2">
      <select class="decisionSelect border px-2 py-1" ${decisionDisabled ? "disabled" : ""}>
        <option value="">${decisionText}</option>
        <option value="Selected">Selected</option>
        <option value="Rejected">Rejected</option>
      </select>
    </td>
    <td class="border px-3 py-2 text-center">
      <i class="fa-solid fa-trash text-red-600 cursor-pointer deleteBtn"></i>
    </td>
  `;

                        // ✅ dropdown change
                        tr.querySelector(".decisionSelect")
                            .addEventListener("change", (e) => {
                                updateDecision(row.invite_id, e.target.value);
                            });

                        // ✅ delete click
                        tr.querySelector(".deleteBtn")
                            .addEventListener("click", () => {
                                deleteInterview(row.invite_id);
                            });

                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    console.error("Failed to load interview table:", err);
                });
        }


        // update the decesion to backend
        function updateDecision(inviteId, decision) {

            if (!decision) return;

            Swal.fire({
                title: "Confirm Decision",
                text: `Are you sure you want to ${decision} this candidate?`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "Yes"
            }).then(result => {

                if (!result.isConfirmed) return;

                fetch("/api/decision", {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        invite_id: inviteId,
                        decision: decision
                    })
                })
                    .then(res => {
                        if (res.status === 403) {
                            Swal.fire("Already Decided", "This action cannot be changed", "info");
                            return;
                        }
                        return res.json();
                    })
                    .then(() => {
                        Swal.fire("Saved", "Decision updated successfully", "success");
                        loadInterviewTable(); // 🔁 refresh table
                    })
                    .catch(() => {
                        Swal.fire("Error", "Failed to save decision", "error");
                    });
            });
        }


        // delete button
        function deleteInterview(inviteId) {

            Swal.fire({
                title: "Delete Interview?",
                text: "This action cannot be undone",
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "Delete",
                confirmButtonColor: "#d33"
            }).then(result => {

                if (!result.isConfirmed) return;

                fetch("/api/delete", {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        invite_id: inviteId
                    })
                })
                    .then(res => res.json())
                    .then(() => {
                        Swal.fire("Deleted", "Interview removed successfully", "success");
                        loadInterviewTable(); // 🔁 refresh table
                    })
                    .catch(() => {
                        Swal.fire("Error", "Failed to delete interview", "error");
                    });
            });
        }



        //----------------------------
        // onclick buttons
        //----------------------------
        document.addEventListener("DOMContentLoaded", () => {

            // navigation
            document.getElementById("goHR")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html";
                });

            document.getElementById("hrBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=hr-logo";
                });

            document.getElementById("financeBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=finance-logo";
                });

            document.getElementById("itBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=it-logo";
                });

            document.getElementById("performanceBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=performance-logo";
                });

            document.getElementById("reportsBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=reports-logo";
                });

            // search
            document.getElementById("searchInput")
                ?.addEventListener("keyup", searchTable);

            // buttons
            document.getElementById("sendInviteBtn")
                ?.addEventListener("click", sendInvite);

            document.getElementById("printBtn")
                ?.addEventListener("click", () => window.print());

        });






        // ================= SESSION CHECK =================
        fetch("/api/auth/session-check", {
            method: "GET",
            credentials: "include"   // ⭐ REQUIRED
        })
            .then(res => res.json())
            .then(data => {
                if (!data.loggedIn) {
                    window.location.href = "index.html"; // redirect to login
                } else {
                    document.getElementById("userName").textContent = data.user.name;
                }
            })
            .catch(err => {
                console.error("Session check failed:", err);
                window.location.href = "index.html";
            });



        loadInterviewTable();
    </script>

</body>

</html>
