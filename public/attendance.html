<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Attendance | Worklife</title>

    <!-- Tailwind CDN -->
    <link rel="stylesheet" href="/output.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-[#c3e2d1] font-[Roboto] min-h-screen">

    <!-- ================= HEADER ================= -->
    <header class="bg-[#52af8d] text-white
       flex items-center justify-between
       h-[44px] md:h-[60px]
       px-2 md:px-4">

        <!-- Left -->
        <div class="flex items-center cursor-pointer" id="goHR">

            <div class="bg-white text-black font-bold
           text-xs md:text-lg
           px-2 md:px-3
           py-0.5 md:py-1
           rounded
           mr-1 md:mr-2">
                WL
            </div>

            <div class="font-bold text-sm md:text-xl">
                Worklife
            </div>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-2 md:gap-3 text-xs md:text-sm">

            <select class="text-black px-2 py-1 rounded">
                <option>Eastern</option>
                <option>Western</option>
                <option>Northern</option>
                <option>Southern</option>
            </select>

            <span class="hidden sm:inline">English</span>

            <div class="flex items-center gap-1">
                <i class="fa-solid fa-circle-user"></i>
                <span id="userName">Loading...</span>
            </div>

            <i class="fa-solid fa-power-off cursor-pointer" id="logoutBtn"></i>
        </div>
    </header>

    <!-- ================= MAIN ================= -->
    <div class="w-full
     flex flex-col md:flex-row
     gap-4
     px-2 md:px-4
     pt-4 pb-4">
        <!-- LEFT PANEL -->
        <div class="flex flex-row md:flex-col
            justify-center md:justify-start
            items-center
            w-[70px] md:w-[120px]
            shrink-0
            gap-0
            order-first md:order-none">

            <!-- HR -->
            <button id="hrBtn" class="w-[55px] h-[55px]
               md:w-[110px] md:h-[100px]
               p-[6px] md:p-0
               bg-[#a493b9] text-white
               flex flex-col justify-center items-center
               transition-all duration-200
               hover:-translate-y-1 hover:shadow-xl">

                <i class="fa-regular fa-user text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">HR</span>
            </button>

            <!-- Finance -->
            <button id="financeBtn" class="w-[55px] h-[55px]
               md:w-[110px] md:h-[100px]
               p-[6px] md:p-0
               bg-[#c78864] text-white
               flex flex-col justify-center items-center
               transition-all duration-200
               hover:-translate-y-1 hover:shadow-xl">

                <i class="fa-regular fa-folder text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">Finance</span>
            </button>

            <!-- IT -->
            <button id="itBtn" class="w-[55px] h-[55px]
               md:w-[110px] md:h-[100px]
               p-[6px] md:p-0
               bg-[#863f33] text-white
               flex flex-col justify-center items-center
               transition-all duration-200
               hover:-translate-y-1 hover:shadow-xl">

                <i class="fa-solid fa-desktop text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">IT</span>
            </button>

            <!-- Performance -->
            <button id="performanceBtn" class="w-[55px] h-[55px]
               md:w-[110px] md:h-[100px]
               p-[6px] md:p-0
               bg-[#15ac7f] text-white
               flex flex-col justify-center items-center
               transition-all duration-200
               hover:-translate-y-1 hover:shadow-xl">

                <i class="fa-solid fa-clock text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">Performance</span>
            </button>

            <!-- Reports -->
            <button id="reportsBtn" class="w-[55px] h-[55px]
               md:w-[110px] md:h-[100px]
               p-[6px] md:p-0
               bg-[#82b435] text-white
               flex flex-col justify-center items-center
               transition-all duration-200
               hover:-translate-y-1 hover:shadow-xl">

                <i class="fa-solid fa-chart-bar text-[16px] md:text-xl"></i>
                <span class="text-[8px] md:text-sm leading-none">Reports</span>
            </button>

        </div>

        <!-- ================= RIGHT CONTENT ================= -->
        <div class="flex-1 bg-white rounded-xl shadow-md p-4 md:p-6">

            <!-- TOP BAR -->
            <div class="flex flex-col md:flex-row
              md:items-center md:justify-between
              gap-4 mb-6">

                <!-- Title -->
                <h2 class="text-lg md:text-xl font-bold text-gray-700">
                    Attendance List
                </h2>

                <button id="generateReportBtn" class="bg-green-600 text-white px-3 py-1 rounded">
                    Generate Report
                </button>

                <!-- Date + Search -->
                <div class="flex items-center gap-3">

                    <!-- Date Filter Button -->
                    <button id="openDateFilter" class="flex items-center gap-2 bg-[#1e3a8a] hover:-translate-y-0.5 hover:shadow-lg 
                    transition-all duration-200 text-white px-3 py-1.5 text-sm rounded">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span id="selectedDateLabel">Select Date</span>
                    </button>

                    <input type="text" id="searchInput" placeholder="Search employee..." class="border border-gray-300 rounded-md
                    px-3 py-1 text-sm
                    focus:outline-none
                    focus:ring-1 focus:ring-[#52af8d]">
                </div>
            </div>

            <!-- TABLE -->
            <div class="overflow-x-auto border border-gray-300 rounded-lg">
                <table class="w-full text-sm border border-gray-300">

                    <!-- HEADER -->
                    <thead class="bg-[#e6f4ef] text-[#165c42] sticky top-0 z-10">
                        <tr>
                            <th class="border border-gray-300 px-3 py-2">#</th>
                            <th class="border border-gray-300 px-3 py-2 text-left">Name</th>
                            <th class="border border-gray-300 px-3 py-2">Login Time</th>
                            <th class="border border-gray-300 px-3 py-2">Logout Time</th>
                            <th class="border border-gray-300 px-3 py-2">Type</th>
                            <th class="border border-gray-300 px-3 py-2">Late</th>
                            <th class="border border-gray-300 px-3 py-2">Actions</th>
                            <th class="border border-gray-300 px-3 py-2">Location</th>
                        </tr>
                    </thead>

                    <!-- BODY -->
                    <tbody id="attendanceTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>


    <!-- ================= DATE FILTER MODAL ================= -->
    <div id="dateFilterModal" class="fixed inset-0
            bg-black/40
            hidden
            flex items-center justify-center
            z-50">

        <div class="bg-white rounded-xl shadow-lg
              w-[90%] max-w-[380px]
              p-6">

            <h3 class="text-lg font-bold text-gray-700 mb-4">
                Select Date Range
            </h3>

            <!-- Start Date -->
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">
                    Start Date
                </label>
                <input type="date" id="startDate" class="w-full border rounded px-3 py-2 text-sm">
            </div>

            <!-- End Date -->
            <div class="mb-6">
                <label class="block text-sm font-medium mb-1">
                    End Date
                </label>
                <input type="date" id="endDate" class="w-full border rounded px-3 py-2 text-sm">
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-3">
                <button id="cancelDateFilter" class="px-4 py-2
                     text-sm border rounded
                     hover:bg-gray-100">
                    Cancel
                </button>

                <button id="applyDateFilter" class="px-4 py-2
                     text-sm bg-blue-600 text-white rounded
                     hover:bg-blue-700">
                    Apply
                </button>
            </div>
        </div>
    </div>


    <!-- IMAGE POPUP -->
    <div id="imageModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="bg-white p-4 rounded-lg relative max-w-lg">
            <button id="closeImageBtn" class="absolute top-2 right-3 text-xl font-bold">
                ×
            </button>
            <img id="popupImage" src="" class="max-w-full rounded">
        </div>
    </div>


    <script>
        // date
        const dateEl = document.getElementById("currentDate");
        if (dateEl) {
            dateEl.innerText = new Date().toDateString();
        }


        // date pop up open
        const modal = document.getElementById("dateFilterModal");
        const openBtn = document.getElementById("openDateFilter");
        const cancelBtn = document.getElementById("cancelDateFilter");
        const applyBtn = document.getElementById("applyDateFilter");
        const label = document.getElementById("selectedDateLabel");

        let selectedStartDate = "";
        let selectedEndDate = "";

        // ✅ FIXED
        openBtn.addEventListener("click", () => {
            modal.classList.remove("hidden");
        });

        cancelBtn.addEventListener("click", () => {
            modal.classList.add("hidden");
        });

        applyBtn.addEventListener("click", () => {
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;

            if (!start || !end) {
                alert("Please select both dates");
                return;
            }

            selectedStartDate = start;
            selectedEndDate = end;

            label.innerText = `${start} → ${end}`;
            modal.classList.add("hidden");

            loadAttendance(start, end);
        });

        // search bar
        const searchInput = document.getElementById("searchInput");
        const tableBody = document.getElementById("attendanceTable");

        if (searchInput && tableBody) {
            searchInput.addEventListener("keyup", function () {
                const searchValue = this.value.toLowerCase();
                const rows = tableBody.getElementsByTagName("tr");

                for (let i = 0; i < rows.length; i++) {
                    const rowText = rows[i].innerText.toLowerCase();
                    rows[i].style.display = rowText.includes(searchValue) ? "" : "none";
                }
            });
        }


        // attendance
        async function loadAttendance(startDate = "", endDate = "") {
            try {
                let url = "https://worklife.globesproperties.in/attendance/attendance";

                // ✅ Add filter params
                if (startDate && endDate) {
                    url += `?start=${startDate}&end=${endDate}`;
                }

                const response = await fetch(url);
                const result = await response.json();

                const tbody = document.getElementById("attendanceTable");
                tbody.innerHTML = "";

                result.data.forEach((row, index) => {
                    const tr = document.createElement("tr");

                    tr.className = "hover:bg-gray-50 transition h-[60px]";

                    tr.innerHTML = `
                    <td class="border border-gray-300 px-3 py-2 text-center">${index + 1}</td>
                    <td class="border border-gray-300 px-3 py-2 font-medium text-gray-700">
                        ${row.name}
                        </td>
                        <td class="border border-gray-300 px-3 py-2 text-center">
                            ${formatDateTime(row.login_time)}
                            </td>
                            <td class="border border-gray-300 px-3 py-2 text-center">
                                ${formatDateTime(row.logout_time)}
                                </td>
                                <td class="border border-gray-300 px-3 py-2 text-center">
                                    <span class="px-2 py-1 text-xs rounded 
                                    ${row.login_type === "Office"
                            ? "bg-orange-100 text-orange-700"
                            : "bg-blue-100 text-blue-700"}">
                                    ${row.login_type}
                                    </span>
                                    </td>
                                    <td class="border border-gray-300 px-3 py-2 text-center">
                                        ${formatLate(row.late_minutes, row.late_seconds)}
                                        </td>
                                            `;


                    // ================= ACTIONS COLUMN (FIXED) =================
                    const actionTd = document.createElement("td");
                    actionTd.className = "border border-gray-300 px-3 py-2";

                    const wrapper = document.createElement("div");
                    wrapper.className = "flex items-center justify-center gap-2";

                    // IMAGE BUTTON
                    if (row.image) {
                        const imgBtn = document.createElement("button");
                        imgBtn.className =
                            "flex items-center gap-1 bg-green-600 hover:bg-green-700 text-white text-xs px-2 py-1 rounded shadow";

                        imgBtn.innerHTML = `<i class="fa-solid fa-image"></i> Img`;

                        imgBtn.addEventListener("click", () => {
                            showImage(row.image);
                        });

                        wrapper.appendChild(imgBtn);
                    } else {
                        const span = document.createElement("span");
                        span.className = "text-gray-400 text-xs";
                        span.textContent = "-";
                        wrapper.appendChild(span);
                    }

                    // MAP BUTTON
                    if (row.location_address) {
                        const mapBtn = document.createElement("button");
                        mapBtn.className =
                            "flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white text-xs px-2 py-1 rounded shadow";

                        mapBtn.innerHTML = `<i class="fa-solid fa-location-dot"></i> Map`;

                        mapBtn.addEventListener("click", () => {
                            openMap(row.location_address);
                        });

                        wrapper.appendChild(mapBtn);
                    }

                    actionTd.appendChild(wrapper);
                    tr.appendChild(actionTd);

                    // LOCATION COLUMN
                    const locationTd = document.createElement("td");
                    locationTd.className = "border border-gray-300 px-3 py-2 text-xs max-w-[200px] break-words";
                    locationTd.textContent = row.location_address ?? "-";

                    tr.appendChild(locationTd);

                    // ADD ROW

                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Error loading attendance", err);
            }
        }

        // Load on page load
        loadAttendance();




        // xcel or pdf
        function generateReport() {

            if (!selectedStartDate || !selectedEndDate) {
                alert("Please select date first");
                return;
            }

            Swal.fire({
                title: "Download Report",
                text: "Choose format",
                showCancelButton: true,
                confirmButtonText: "PDF",
                cancelButtonText: "Excel"
            }).then((result) => {

                if (result.isConfirmed) {
                    window.open(`https://worklife.globesproperties.in/attendance/download?start=${selectedStartDate}&end=${selectedEndDate}&type=pdf`);
                } else {
                    window.open(`https://worklife.globesproperties.in/attendance/download?start=${selectedStartDate}&end=${selectedEndDate}&type=excel`);
                }

            });
        }





        //-----------------------------------
        // onclick buttons
        //-----------------------------------
        document.addEventListener("DOMContentLoaded", () => {

            // HEADER NAV
            document.getElementById("goHR")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html";
                });

            // SIDEBAR
            document.getElementById("hrBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=hr-logo";
                });

            document.getElementById("financeBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=finance-logo";
                });

            document.getElementById("itBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=it-logo";
                });

            document.getElementById("performanceBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=performance-logo";
                });

            document.getElementById("reportsBtn")
                ?.addEventListener("click", () => {
                    window.location.href = "humanresource.html?section=reports-logo";
                });

            // REPORT BUTTON
            document.getElementById("generateReportBtn")
                ?.addEventListener("click", generateReport);

            // IMAGE CLOSE BUTTON
            document.getElementById("closeImageBtn")
                ?.addEventListener("click", closeImage);

            // CLICK OUTSIDE IMAGE MODAL
            document.getElementById("imageModal")
                ?.addEventListener("click", outsideClick);

        });






        // Sessions
        fetch("/api/auth/session-check", {
            method: "GET",
            credentials: "include" // ⭐ REQUIRED
        })
            .then(res => res.json())
            .then(data => {
                if (!data.loggedIn) {
                    window.location.href = "index.html";
                } else {
                    document.getElementById("userName").textContent = data.user.name;
                }
            })
            .catch(error => {
                console.error("Session check failed:", error);
                window.location.href = "index.html";
            });



        // image popup 
        function showImage(imagePath) {

            const modal = document.getElementById("imageModal");
            const img = document.getElementById("popupImage");

            img.src = imagePath;

            modal.classList.remove("hidden");
            modal.classList.add("flex");

        }

        function closeImage() {

            const modal = document.getElementById("imageModal");

            modal.classList.remove("flex");
            modal.classList.add("hidden");

        }

        function outsideClick(event) {

            const modal = document.getElementById("imageModal");

            if (event.target === modal) {
                closeImage();
            }

        }

        function openMap(address) {

            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;

            window.open(url, "_blank");

        }



        // formating date
        function formatDateTime(dt) {
            if (!dt) return "-";

            const date = new Date(dt);

            return date.toLocaleString("en-IN", {
                year: "numeric",
                month: "short",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit",
                hour12: true
            });
        }

        // late min and sec calculations
        function formatLate(mins, secs) {
            if ((!mins || mins <= 0) && (!secs || secs <= 0)) {
                return `<span style="color:green">On Time</span>`;
            }

            const hours = Math.floor(mins / 60);
            const remainingMinutes = mins % 60;

            return `<span style="color:red">
        ${hours > 0 ? hours + " hr " : ""}
        ${remainingMinutes > 0 ? remainingMinutes + " min " : ""}
        ${secs > 0 ? secs + " sec" : ""}
    </span>`;
        }




        document.getElementById("logoutBtn")
            ?.addEventListener("click", logoutUser);





        // logout
        function logoutUser() {
            Swal.fire({
                title: "Are you sure?",
                text: "You will be logged out from your session.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Yes, logout",
                cancelButtonText: "Cancel"
            }).then((result) => {
                if (result.isConfirmed) {
                    // Call logout API
                    fetch("/api/auth/logout")
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                Swal.fire({
                                    title: "Logged Out!",
                                    text: "You have been successfully logged out.",
                                    icon: "success",
                                    showConfirmButton: false,
                                    timer: 2000
                                });

                                setTimeout(() => {
                                    window.location.href = "index.html"; // Redirect to login
                                }, 2000);
                            } else {
                                Swal.fire("Oops!", "Logout failed. Try again.", "error");
                            }
                        })
                        .catch(err => {
                            console.error("Logout error:", err);
                            Swal.fire("Error", "Something went wrong. Try again.", "error");
                        });
                }
            });
        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
