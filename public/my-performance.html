<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>My Performance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #dff5e4, #f8fffb, #e0f2df);
            color: #333;
        }

        /* HEADER */
        header {
            background-color: #52af8d;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            height: 50px;
        }

        .header-left {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .logo-box {
            background-color: white;
            color: black;
            font-weight: bold;
            font-size: 18px;
            padding: 6px 12px;
            border-radius: 4px;
            margin-right: 10px;
        }

        .worklife-text {
            font-size: 20px;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header select {
            background-color: white;
            border: 1px solid white;
            color: rgb(10, 10, 10);
            padding: 4px 6px;
            border-radius: 4px;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout {
            cursor: pointer;
        }

        /* LEFT PANEL */
        .left-panel {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 25px;
            margin-top: 75px;
        }

        .left-panel button {
            width: 110px;
            height: 100px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 0px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .left-panel button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
        }

        .btn-hr {
            background-color: #a493b9;
        }

        .btn-finance {
            background-color: #c78864;
        }

        .btn-it {
            background-color: #863f33;
        }

        .btn-pm {
            background-color: #15ac7f;
        }

        .btn-reports {
            background-color: #82b435;
        }

        .left-panel i {
            font-size: 30px;
            margin-bottom: 5px;
        }

        .main-content {
            margin-left: 160px;
        }

        /* -----------------------------------
            Content
        ----------------------------------- */
        .content {
            padding: 30px;
            background-color: #ffffff;
            margin: 30px auto 10px auto;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);


            width: 86%;
            margin-left: 160px;
        }

        .content h1 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #52af8d;
            font-weight: bold;
        }

        .status-buttons button {
            background: none;
            border: 2px solid #ccc;
            padding: 8px 16px;
            margin-right: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .status-buttons button:hover {
            background-color: #007bff;
            color: #fff;
            border-color: #007bff;
        }

        /* -----------------------------------
           Table
        ----------------------------------- */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            background-color: #3a9d79;
            color: white;
            padding: 12px;
            font-size: 15px;
            border-right: 1px solid #dcdcdc;
        }

        td {
            background-color: #ffffff;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            border-right: 1px solid #5dbd98;
        }

        tr:hover td {
            background-color: #e4f3eb;
        }

        .action-icons {
            display: flex;
            gap: 10px;
        }

        .icon-box {
            padding: 10px;
            border-radius: 0px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: rgb(14, 13, 13);
            background-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease, transform 0.2s ease;

            border: none;
            outline: none;
        }

        .icon-box.view:hover {
            background-color: #35a38b;
            color: rgb(102, 93, 93);
        }

        .status-box {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
            display: inline-block;
        }

        /* small version */
        .status-box.small {
            font-size: 11px;
            padding: 4px 8px;
        }

        /* STATUS COLORS */
        .status-box.small.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-box.small.approved {
            background: #d4edda;
            color: #155724;
        }

        .status-box.small.rejected {
            background: #f8d7da;
            color: #721c24;
        }


        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            width: 600px;
            border-radius: 8px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }

        /* TRACKER */
        .tracker {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 20px;
        }

        .step {
            text-align: center;
        }

        .status-square {
            width: 160px;
            height: 40px;
            border-radius: 0px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6px;
            box-sizing: border-box;
            white-space: normal;
        }

        .status-approved {
            background-color: #28a745;
        }

        .status-pending {
            background-color: #ffc107;
            color: #000;
        }

        .status-cancelled {
            background-color: #dc3545;
        }

        .status-skipped {
            background-color: #6c757d;
        }

        .label {
            margin-top: 6px;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            text-transform: capitalize;
        }

        .arrow-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
            margin-top: -24px;
        }

        .arrow {
            font-size: 20px;
            color: #0c0c0c;
        }

        /* show only respected trackr based on condition */
        #startStageContainer,
        #midStageContainer {
            display: none;
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div id="headerLogo" class="header-left">
            <div class="logo-box">WL</div>
            <div class="worklife-text">Worklife</div>
        </div>
        <div class="header-right">
            <select>
                <option>Eastern</option>
                <option>Western</option>
                <option>Northern</option>
                <option>Southern</option>
            </select>
            <span>English</span>
            <div class="profile">
                <i class="fa-solid fa-circle-user"></i>
                <span id="userName">Loading...</span>
            </div>
            <div class="logout" id="logoutBtn">
                <i class="fas fa-power-off"></i>
            </div>
        </div>
    </header>

    <!-- LEFT PANEL -->
    <div id="sidePanel" class="left-panel">
        <button class="btn-hr" id="hrBtn">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <i class="fa-regular fa-user"></i>
                <span>HR</span>
            </div>
        </button>

        <button class="btn-finance" id="financeBtn">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <i class="fa-regular fa-folder"></i>
                <span>Finance</span>
            </div>
        </button>

        <button class="btn-it" id="itBtn">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <i class="fa-solid fa-desktop"></i>
                <span>IT</span>
            </div>
        </button>

        <button class="btn-pm" id="performanceBtn">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <i class="fa-solid fa-clock"></i>
                <span>Performance</span>
            </div>
        </button>

        <button class="btn-reports" id="reportsBtn">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <i class="fa-solid fa-chart-bar"></i>
                <span>Reports</span>
            </div>
        </button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
        <h1>My Performance Management</h1>

        <div class="status-buttons">
            <button id="allBtn">All</button>
            <button id="approvedBtn">Approved</button>
            <button id="pendingBtn">Pending</button>
            <button id="rejectedBtn">Rejected</button>
        </div>

        <table id="performanceTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Req No</th>
                    <th>Name</th>
                    <th>Stage</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic rows will be loaded here -->
            </tbody>
        </table>
    </div>

    <!-- PERFORMANCE MODAL -->
    <div class="modal" id="performanceModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">
                <i class="fa-solid fa-rectangle-xmark"></i>
            </span>

            <h3>
                Performance Management
                <span id="performanceStatusTag" class="status-box small">Status</span>
            </h3>

            <p><strong>Name:</strong> <span id="perfName"></span></p>
            <p><strong>Request No:</strong> <span id="perfReqNo"></span></p>

            <div id="perfRejectSection" style="display: none; margin-top: 20px;">
                <h4 style="color: #dc3545;">Rejected Details</h4>
                <p><strong>Rejected By:</strong> <span id="perfRejectedBy">N/A</span></p>
                <p><strong>Reason:</strong> <span id="perfRejectionReason">N/A</span></p>
            </div>

            <!-- Stage / Flow details -->
            <div id="startStageContainer" style="margin-bottom: 20px;">
                <h4>Start Stage</h4>
                <div id="performanceFlowStartStage"></div>
            </div>

            <div id="midStageContainer" style="margin-bottom: 20px;">
                <h4>Mid Stage</h4>
                <div id="performanceFlowMidStage"></div>
            </div>

            <div id="fullStageContainer" style="margin-bottom: 20px;">
                <h4>Full Stage</h4>
                <div id="performanceFlowFullStage"></div>
            </div>


            <div id="performanceApprovalNote"></div>
        </div>
    </div>

    <script>
        // table data
        async function loadMyPerformanceRequests(filter = "all") {
            console.log("🔹 Calling /api/section/my-performance-requests");

            try {
                const response = await fetch("/api/section/my-performance-requests");
                const data = await response.json();
                console.log("🔍 API Response Data:", data);

                const tableBody = document.querySelector("#performanceTable tbody");
                tableBody.innerHTML = "";

                // ✅ FILTER LOGIC
                let filteredData = data;

                if (filter !== "all") {
                    filteredData = data.filter(row =>
                        (row.Status || "pending").toLowerCase() === filter.toLowerCase()
                    );
                }

                // ✅ LOOP
                filteredData.forEach((row, index) => {
                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${row.ReqNo}</td>
                <td>${row.Name}</td>
                <td>${row.Stage || "-"}</td>
                <td>
                    <span class="status-box small ${(row.Status || 'pending').toLowerCase()}">
                        ${row.Status || 'Pending'}
                    </span>
                </td>
            `;

                    const viewBtn = document.createElement("button");
                    viewBtn.className = "icon-box view";
                    viewBtn.innerHTML = `<i class="fa-solid fa-eye"></i>`;

                    viewBtn.addEventListener("click", () => {
                        openPerformancePopup(row.ID, row.Stage);
                    });

                    const actionTd = document.createElement("td");
                    actionTd.appendChild(viewBtn);
                    tr.appendChild(actionTd);

                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error("❌ Error fetching performance requests:", error);
            }
        }



        // popup modal open
        function openPerformancePopup(id, stage) {
            console.log("🔹 Open popup for request ID:", id);

            // show propr tracker based on condition
            document.getElementById("performanceFlowStartStage").innerHTML = "";
            document.getElementById("performanceFlowMidStage").innerHTML = "";
            document.getElementById("performanceFlowFullStage").innerHTML = "";
            document.getElementById("startStageContainer").style.display = "none";
            document.getElementById("midStageContainer").style.display = "none";
            document.getElementById("fullStageContainer").style.display = "none";
            document.getElementById("perfRejectSection").style.display = "none";


            fetch(`/api/section/performance/requests/${id}`, { credentials: "include" })
                .then(res => res.json())
                .then(data => {
                    // Fill modal header
                    document.getElementById("perfName").textContent = data.employee_name || "N/A";
                    document.getElementById("perfReqNo").textContent = data.req_no || "-";

                    const statusTag = document.getElementById("performanceStatusTag");
                    console.log("🧪 statusTag element:", statusTag);

                    let stageStatus = "Pending";
                    let rejectedByName = null;
                    let rejectionReason = null;

                    if (stage === "start_stage" && data.start_stage) {
                        stageStatus = data.start_stage.status || "Pending";
                        rejectedByName = data.start_stage.rejected_by_name;
                        rejectionReason = data.start_stage.rejection_reason;
                    }
                    else if (stage === "mid_stage" && data.mid_stage) {
                        stageStatus = data.mid_stage.status || "Pending";
                        rejectedByName = data.mid_stage.rejected_by_name;
                        rejectionReason = data.mid_stage.rejection_reason;
                    } else if (stage === "full_stage" && data.full_stage) {
                        stageStatus = data.full_stage.status || "Pending";
                        rejectedByName = data.full_stage.rejected_by_name;
                        rejectionReason = data.full_stage.rejection_reason;
                    }

                    statusTag.textContent = stageStatus;
                    statusTag.className = `status-box small ${stageStatus.toLowerCase()}`;

                    const rejectDiv = document.getElementById("perfRejectSection");
                    if (stageStatus.toLowerCase() === "rejected") {
                        rejectDiv.style.display = "block";
                        document.getElementById("perfRejectedBy").textContent = rejectedByName || "N/A";
                        document.getElementById("perfRejectionReason").textContent = rejectionReason || "N/A";
                    } else {
                        rejectDiv.style.display = "none";
                    }


                    // Show modal
                    document.getElementById("performanceModal").style.display = "flex";

                    // Show only the relevant stage container
                    if (stage === "start_stage") {
                        document.getElementById("startStageContainer").style.display = "block";
                        trackPerformanceApproval(id, "start_stage", "performanceFlowStartStage");
                    }
                    else if (stage === "mid_stage") {
                        document.getElementById("midStageContainer").style.display = "block";
                        trackPerformanceApproval(id, "mid_stage", "performanceFlowMidStage");
                    }
                    else if (stage === "full_stage") {
                        document.getElementById("fullStageContainer").style.display = "block";
                        trackPerformanceApproval(id, "full_stage", "performanceFlowFullStage");
                    }
                    else {
                        console.warn("⚠ Unknown stage:", stage);
                    }
                })
                .catch(err => {
                    console.error("❌ Error fetching performance request details:", err);
                    Swal.fire("Error", "Unable to load performance request details.", "error");
                });
        }


        function closePerformanceModal() {
            console.log("🔹 Closing popup modal");
            document.getElementById("performanceModal").style.display = "none";
        }

        // Load data when page is ready
        document.addEventListener("DOMContentLoaded", loadMyPerformanceRequests);




        // tracking 
        function trackPerformanceApproval(reqId, stage, containerId) {
            fetch(`/api/section/performance/requests/${reqId}/approvals?stage=${stage}`)
                .then(res => res.json())
                .then(steps => {
                    const container = document.getElementById(containerId);
                    container.innerHTML = "";


                    if (!steps.length) {
                        container.innerHTML = "No approval steps.";
                        return;
                    }

                    let html = `<div style="display: flex; justify-content: center; align-items: center; flex-wrap: nowrap; overflow-x: auto;">`;

                    steps.forEach((step, i) => {
                        const name = step.approved_by_name || "N/A";
                        const status = step.status?.toLowerCase() || "pending";

                        let color = "#ddd";
                        if (status === "approved") color = "#28a745";
                        else if (status === "pending") color = "#ffc107";
                        else if (status === "rejected") color = "#dc3545";
                        else if (status === "skipped") color = "#6c757d";

                        html += `
                    <div style="display: flex; flex-direction: column; align-items: center; margin: 0 10px;">
                        <div style="
                            padding: 10px 16px;
                            background: ${color};
                            color: #fff;
                            border-radius: 4px;
                            font-weight: bold;
                            min-width: 130px;
                            text-align: center;
                            white-space: nowrap;
                        ">
                            ${name}
                        </div>
                        <div style="font-size: 14px; font-weight: bold; margin-top: 6px; text-transform: capitalize;">
                            ${status}
                        </div>
                    </div>
                    `;

                        if (i < steps.length - 1) {
                            html += `<div style="display: flex; align-items: center; font-size: 24px; margin-top: -26px;">➡</div>`;
                        }
                    });

                    html += `</div>`;
                    container.innerHTML = html;
                })
                .catch(err => console.error("Failed to load performance tracking info:", err));
        }



        // open popup direct from notification
        document.addEventListener("DOMContentLoaded", () => {
            // Check if "id" exists in URL
            const urlParams = new URLSearchParams(window.location.search);
            const appraisalId = urlParams.get("id");
            const stage = urlParams.get("stage");

            if (appraisalId) {
                console.log("🔔 Opening popup directly from notification, ID:", appraisalId);
                openPerformancePopup(appraisalId, stage);
            } else {
                // Normal flow → load all requests into table
                loadMyPerformanceRequests();
            }
        });



        // status tag 
        function setPerformanceStatus(status) {
            const statusTag = document.getElementById("performanceStatusTag");

            if (!statusTag) return;

            const cleanStatus = status.toLowerCase().trim();

            // reset previous classes
            statusTag.className = "status-box small";

            // add status class
            statusTag.classList.add(cleanStatus);

            // set text
            statusTag.textContent = status;
        }




        // session check
        fetch("/api/auth/session-check", {
            method: "GET",
            credentials: "include"   // ⭐ MUST
        })
            .then(res => res.json())
            .then(data => {

                if (!data.loggedIn) {
                    window.location.href = "index.html";
                    return;
                }

                // ✅ Username
                document.getElementById("userName").textContent = data.user.name;

                // ✅ Store user id
                sessionStorage.setItem("user_id", data.user.user_id);

                // ===============================
                // ✅ HEADER REDIRECT
                // ===============================
                const header = document.getElementById("headerLogo");

                if (header) {
                    header.addEventListener("click", () => {
                        window.location.href =
                            data.user.roleId === 4
                                ? "employee-dashboard.html"
                                : "humanresource.html";
                    });
                }

                // ===============================
                // ✅ SIDEBAR CHANGE
                // ===============================
                if (data.user.roleId === 4) {

                    const panel = document.getElementById("sidePanel");

                    if (panel) {
                        panel.innerHTML = `

            <button class="btn-hr" id="leaveBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Leave</span>
                </div>
            </button>

            <button class="btn-finance" id="expenseBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-money-bill"></i>
                    <span>Expense</span>
                </div>
            </button>

            <button class="btn-reports" id="performanceBtn2">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-chart-column"></i>
                    <span>Performance</span>
                </div>
            </button>

            <button class="btn-it" id="petrolBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-gas-pump"></i>
                    <span>Petrol</span>
                </div>
            </button>

            <button class="btn-pm" id="salesBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Incentive</span>
                </div>
            </button>

            <!-- 🔵 Blue Certificate -->
            <button class="btn-reports" style="background-color:#0d6efd;" id="certificateBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-certificate"></i>
                    <span>Certificate</span>
                </div>
            </button>

            `;

                        document.getElementById("leaveBtn")?.addEventListener("click", () => location.href = "LeaveRequest.html");
                        document.getElementById("expenseBtn")?.addEventListener("click", () => location.href = "expense-claim.html");
                        document.getElementById("performanceBtn2")?.addEventListener("click", () => location.href = "performance.html");
                        document.getElementById("petrolBtn")?.addEventListener("click", () => location.href = "petrol-conveyance.html");
                        document.getElementById("salesBtn")?.addEventListener("click", () => location.href = "sales.html");
                        document.getElementById("certificateBtn")?.addEventListener("click", () => location.href = "certificate.html");
                    }
                }

            })
            .catch(error => {
                console.error("Session check failed:", error);
                window.location.href = "index.html";
            });




        // LOGOUT
        document.getElementById("logoutBtn")?.addEventListener("click", logoutUser);

        // SIDEBAR
        document.getElementById("hrBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=hr-logo");
        document.getElementById("financeBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=finance-logo");
        document.getElementById("itBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=it-logo");
        document.getElementById("performanceBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=performance-logo");
        document.getElementById("reportsBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=reports-logo");

        // filters
        document.getElementById("allBtn")?.addEventListener("click", () => loadMyPerformanceRequests("all"));
        document.getElementById("approvedBtn")?.addEventListener("click", () => loadMyPerformanceRequests("approved"));
        document.getElementById("pendingBtn")?.addEventListener("click", () => loadMyPerformanceRequests("pending"));
        document.getElementById("rejectedBtn")?.addEventListener("click", () => loadMyPerformanceRequests("rejected"));
       
        // close X
        document.getElementById("closeModalBtn")?.addEventListener("click", closePerformanceModal);
        // close by clicking outside
        window.addEventListener("click", function (event) {
            const modal = document.getElementById("performanceModal");
            if (event.target === modal) {
                closePerformanceModal();
            }
        });


        

        // logout
        function logoutUser() {
            Swal.fire({
                title: "Are you sure?",
                text: "You will be logged out from your session.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Yes, logout",
                cancelButtonText: "Cancel"
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch("/api/auth/logout")
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                Swal.fire({
                                    title: "Logged Out!",
                                    text: "You have been successfully logged out.",
                                    icon: "success",
                                    showConfirmButton: false,
                                    timer: 2000
                                });
                                setTimeout(() => window.location.href = "index.html", 2000);
                            } else {
                                Swal.fire("Oops!", "Logout failed. Try again.", "error");
                            }
                        })
                        .catch(err => {
                            console.error("Logout error:", err);
                            Swal.fire("Error", "Something went wrong. Try again.", "error");
                        });
                }
            });
        }


    </script>
</body>

</html>
