<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Choose Login Option</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-card {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
        }

        .option-card h2 {
            margin-bottom: 8px;
            font-weight: 600;
        }

        .option-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .office-btn {
            background: #28a745;
            color: #fff;
        }

        .office-btn:hover {
            background: #218838;
        }

        .site-btn {
            background: #007bff;
            color: #fff;
        }

        .site-btn:hover {
            background: #0056b3;
        }

        .loading {
            display: none;
            margin-top: 15px;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="option-card">
        <h2>Choose Login Option</h2>
        <p>Please select how you want to mark attendance</p>

        <button class="login-btn office-btn" id="officeLoginBtn">
            🏢 Office Login
        </button>

        <button class="login-btn site-btn" id="siteLoginBtn">
            📍 Site Login
        </button>

        <div class="loading" id="loadingText">Processing attendance...</div>
    </div>


    <script>

        // onclick
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("officeLoginBtn")?.addEventListener("click", officeLogin);
            document.getElementById("siteLoginBtn")?.addEventListener("click", siteLogin);
        });


        function showLoading() {
            document.getElementById('loadingText').style.display = 'block';
        }

        /* ===== OFFICE LOGIN ===== */
        function officeLogin() {
            showLoading();

            fetch('/attendance/office-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/attendance/success';
                    } else {
                        alert(data.message || 'Office login failed');
                        document.getElementById('loadingText').style.display = 'none';
                    }
                })
                .catch(() => {
                    alert('Server error');
                    document.getElementById('loadingText').style.display = 'none';
                });
        }

        /* ===== SITE LOGIN ===== */
        function siteLogin() {
            window.location.href = '/attendance/site-login';
        }


    </script>

</body>

</html>
