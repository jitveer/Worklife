<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Logout Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d2671, #c33764);
        }

        /* Card */

        .card {
            background: white;
            width: 380px;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icon */

        .icon {
            font-size: 70px;
            margin-bottom: 15px;
            color: #28a745;
        }

        /* Title */

        h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* Button */

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="icon">✅</div>

        <h2>Logout Successful</h2>

        <p class="subtitle">
            Your attendance logout has been recorded successfully.
        </p>

        <button id="okBtn">OK</button>

    </div>

    <script>

        function goBack() {
            window.location.href = "/attendance/passcode.html";
        }


        // onclick
        document.getElementById("okBtn")?.addEventListener("click", goBack);

    </script>

</body>

</html>
