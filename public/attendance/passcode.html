<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Attendance Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .login-card h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .passcode-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .passcode-input {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 22px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        .passcode-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #5563d6;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 480px) {
            .passcode-input {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>Enter Passcode</h2>
        <p>Enter your 4-digit attendance passcode</p>

        <form id="passcodeForm">
            <div class="passcode-box">
                <input type="text" maxlength="1" class="passcode-input" inputmode="numeric">
                <input type="text" maxlength="1" class="passcode-input" inputmode="numeric">
                <input type="text" maxlength="1" class="passcode-input" inputmode="numeric">
                <input type="text" maxlength="1" class="passcode-input" inputmode="numeric">
            </div>

            <button type="submit" class="btn-submit">Continue</button>
            <div class="error" id="errorMsg"></div>
        </form>
    </div>

    <script>
        const inputs = document.querySelectorAll('.passcode-input');
        const form = document.getElementById('passcodeForm');
        const errorMsg = document.getElementById('errorMsg');

        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            let passcode = '';
            inputs.forEach(input => passcode += input.value);

            if (passcode.length !== 4) {
                showError('Please enter all 4 digits');
                return;
            }

            fetch("/attendance/verify-passcode", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ passcode })
            })
                .then(res => res.json())
                .then(data => {

                    if (!data.success) {
                        showError(data.message)
                        return
                    }

                    if (data.action === "login") {
                        window.location.href = "/attendance/login-options"
                    }

                    if (data.action === "logout") {
                        window.location.href = "/attendance/logout.html"
                    }

                })
                .catch(() => {
                    showError('Server error. Please try again.');
                });
        });

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
        }
    </script>

</body>

</html>
