<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Emergency Logout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        /* Card */

        .container {
            background: white;
            width: 420px;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icon */

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        /* Title */

        h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        /* Textarea */

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 12px;
            font-size: 14px;
            resize: none;
            margin-bottom: 20px;
        }

        /* Buttons */

        .buttons {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit {
            background: #28a745;
            color: white;
        }

        .submit:hover {
            background: #218838;
        }

        .cancel {
            background: #e74c3c;
            color: white;
        }

        .cancel:hover {
            background: #c0392b;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="icon">⚠️</div>

        <h2>Emergency Logout</h2>

        <p class="subtitle">
            You are logging out before 6 PM.<br>
            Please provide a reason.
        </p>

        <textarea id="reason" placeholder="Enter reason for early logout..."></textarea>

        <div class="buttons">

            <button class="submit" id="submitBtn">Submit</button>

            <button class="cancel" id="cancelBtn">Cancel</button>

        </div>

    </div>

    <script>

        function submitReason() {

            const reason = document.getElementById("reason").value;

            if (!reason) {
                alert("Please enter a reason before logging out.");
                return;
            }

            fetch("/attendance/emergency-logout", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ reason })
            })
                .then(res => res.json())
                .then(data => {

                    if (data.success) {
                        window.location.href = "/attendance/logout-success.html";
                    }

                })
                .catch(() => {
                    alert("Something went wrong");
                })

        }

        function cancelLogout() {
            window.location.href = "/attendance/passcode.html";
        }

        // onclick
        document.getElementById("submitBtn")?.addEventListener("click", submitReason);
        document.getElementById("cancelBtn")?.addEventListener("click", cancelLogout);
    </script>

</body>

</html>
