<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>My Leave Requests</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(120deg, #dff5e4, #f8fffb, #e0f2df);
      color: #333;
    }

    .header {
      background-color: #52af8d;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      height: 50px;
    }

    .header-left {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-box {
      background-color: white;
      color: black;
      font-weight: bold;
      font-size: 18px;
      padding: 6px 12px;
      border-radius: 4px;
      margin-right: 10px;
    }

    .worklife-text {
      font-size: 20px;
      font-weight: bold;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header select {
      background-color: white;
      border: 1px solid white;
      color: rgb(10, 10, 10);
      padding: 4px 6px;
      border-radius: 4px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logout {
      cursor: pointer;
    }

    /* === LEFT PANEL === */
    .left-panel {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 25px;
      margin-top: 75PX;
    }

    .left-panel button {
      width: 110px;
      height: 100px;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 0px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .left-panel button:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }

    .btn-hr {
      background-color: #a493b9;
    }

    .btn-finance {
      background-color: #c78864;
    }

    .btn-it {
      background-color: #863f33;
    }

    .btn-pm {
      background-color: #15ac7f;
    }

    .btn-reports {
      background-color: #82b435;
    }

    .btn-employee {
      background: #2e26c0;
      color: white;
    }

    .left-panel i {
      font-size: 25px;
      margin-bottom: 5px;
    }

    .main-content {
      margin-left: 160px;
      /* adjust if needed to match left panel width */
    }

    header {
      background-color: #52af8d;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-box {
      background-color: white;
      color: black;
      font-weight: bold;
      font-size: 18px;
      padding: 6px 12px;
      border-radius: 4px;
      margin-right: 10px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logout {
      cursor: pointer;
    }

    /* -----------------------------------
            Content
        ----------------------------------- */
    .content {
      flex: 1;
      padding: 30px;
      background-color: #ffffff;
      margin: 50px 10px 10px 0px;
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .content h1 {
      font-size: 26px;
      margin-bottom: 25px;
      color: #52af8d;
      font-weight: bold;
    }

    .status-buttons button {
      background: none;
      border: 2px solid #ccc;
      padding: 8px 16px;
      margin-right: 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 30px;
    }

    .status-buttons button:hover {
      background-color: #007bff;
      color: #fff;
      border-color: #007bff;
    }


    /* -----------------------------------
           Table
        ----------------------------------- */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    th {
      background-color: #3a9d79;
      color: white;
      padding: 12px;
      font-size: 15px;
      border-right: 1px solid #dcdcdc;
    }

    td {
      background-color: #ffffff;
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      border-right: 1px solid #5dbd98;
    }

    tr:hover td {
      background-color: #e4f3eb;
    }

    .icon-box {
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .icon-box.view:hover {
      background: #35a38b;
      color: white;
    }

    .status-box {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      display: inline-block;
    }

    .status-box.pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-box.approved {
      background: #d4edda;
      color: #155724;
    }

    .status-box.rejected {
      background: #f8d7da;
      color: #721c24;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #fff;
      padding: 20px;
      width: 600px;
      border-radius: 8px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
    }

    .tracker {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 20px;
    }

    .step {
      text-align: center;
    }

    .status-square {
      width: 160px;
      height: 40px;
      border-radius: 0px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px;
      box-sizing: border-box;
      white-space: normal;
      /* Allow wrapping */
    }

    /* Color statuses */
    .status-approved {
      background-color: #28a745;
    }

    .status-pending {
      background-color: #ffc107;
      color: #000;
    }

    .status-cancelled {
      background-color: #dc3545;
    }

    .status-skipped {
      background-color: #6c757d;
    }

    .label {
      margin-top: 6px;
      font-size: 12px;
      text-align: center;
      font-weight: bold;
      text-transform: capitalize;
    }

    .arrow-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
      /* match the square height */
      margin-top: -24px;
    }

    .arrow {
      font-size: 20px;
      color: #0c0c0c;
    }


    /* .line {
      position: absolute;
      top: 20px;
      left: 50%;
      height: 4px;
      background: #ddd;
      z-index: 0;
    } */

    .label {
      margin-top: 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <!-- MAIN CONTENT -->
  <header>
    <div class="header-left" id="headerLogo" style="cursor:pointer;">
      <div class="logo-box">WL</div>
      <div class="worklife-text">Worklife</div>
    </div>
    <div class="header-right">
      <select>
        <option>Eastern</option>
        <option>Western</option>
        <option>Northern</option>
        <option>Southern</option>
      </select>
      <span>English</span>
      <div class="profile">
        <i class="fa-solid fa-circle-user"></i>
        <span id="userName">Loading...</span>
      </div>
      <div class="logout" id="logoutBtn">
        <i class="fas fa-power-off"></i>
      </div>
    </div>
    </div>
  </header>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <button class="btn-hr" id="hrBtn">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <i class="fa-regular fa-user"></i><span>HR</span>
      </div>
    </button>
    <button class="btn-finance" id="financeBtn">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <i class="fa-regular fa-folder"></i><span>Finance</span>
      </div>
    </button>
    <button class="btn-it" id="itBtn">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <i class="fa-solid fa-desktop"></i><span>IT</span>
      </div>
    </button>
    <button class="btn-pm" id="performanceBtn">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <i class="fa-solid fa-clock"></i><span>Performance</span>
      </div>
    </button>
    <button class="btn-reports" id="reportsBtn">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <i class="fa-solid fa-chart-bar"></i><span>Reports</span>
      </div>
    </button>
  </div>

  <!-- MAIN CONTENT (only the content area shifts right) -->
  <div class="main-content">
    <div class="content">
      <h1>My Leave Requests</h1>

      <div class="status-buttons">
        <button id="allBtn">All</button>
        <button id="approvedBtn">Approved</button>
        <button id="pendingBtn">Pending</button>
        <button id="cancelledBtn">Cancelled</button>
      </div>


      <table id="requestsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Leave Type</th>
            <th>From</th>
            <th>To</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- MODAL stays as is -->
  <div class="modal" id="viewModal">
    <div class="modal-content">
      <span class="close-btn" id="closeModalBtn">&times;</span>
      <h3>
        Leave Request Details
        <span id="modalStatusTag" class="status-box">Status</span>
      </h3>
      <div id="requestDetails"></div>
      <h4>Approval Flow</h4>
      <div id="approvalFlow"></div>
    </div>
  </div>

  <script>
    let userEmail;

    // Session check
    fetch("/api/auth/session-check", { credentials: "include" })
      .then(res => res.json())
      .then(data => {
        if (!data.loggedIn) location.href = "index.html";
        userEmail = data.user.email;
        document.getElementById("userName").textContent = data.user.name;

        // ===============================
        // ✅ ADD HEADER CODE HERE 👇
        // ===============================
        const header = document.getElementById("headerLogo");

        if (header) {
          header.addEventListener("click", () => {
            if (data.user.roleId === 4) {
              window.location.href = "employee-dashboard.html";
            } else {
              window.location.href = "dashboard.html";
            }
          });
        }

        //hide left panel for employees
        if (data.user.roleId === 4) {

          const panel = document.querySelector(".left-panel");

          if (panel) {
            panel.innerHTML = `

    <button class="btn-hr"  id="leaveBtn">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <i class="fa-solid fa-calendar-check"></i>
        <span>Leave</span>
      </div>
    </button>

    <button class="btn-finance" id="expenseBtn">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <i class="fa-solid fa-money-bill"></i>
        <span>Expense</span>
      </div>
    </button>

        <button class="btn-pm" id="salesBtn">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <i class="fa-solid fa-chart-line"></i>
        <span>Incentive</span>
      </div>
    </button>

    <button class="btn-it" id="petrolBtn">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <i class="fa-solid fa-gas-pump"></i>
        <span>Petrol</span>
      </div>
    </button>

        <button class="btn-employee" id="certificateBtn">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <i class="fa-solid fa-certificate"></i>
        <span>Certificate</span>
      </div>
    </button>

    <button class="btn-reports" id="performanceBtn2">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <i class="fa-solid fa-chart-column"></i>
        <span>Performance</span>
      </div>
    </button>
    `;
            document.getElementById("leaveBtn")?.addEventListener("click", () => location.href = "LeaveRequest.html");
            document.getElementById("expenseBtn")?.addEventListener("click", () => location.href = "expense-claim.html");
            document.getElementById("salesBtn")?.addEventListener("click", () => location.href = "sales.html");
            document.getElementById("petrolBtn")?.addEventListener("click", () => location.href = "petrol-conveyance.html");
            document.getElementById("certificateBtn")?.addEventListener("click", () => location.href = "certificate.html");
            document.getElementById("performanceBtn2")?.addEventListener("click", () => location.href = "performance.html");

          }
        }


        loadMyRequests();
      });

    document.addEventListener("DOMContentLoaded", () => {

      // logout
      document.getElementById("logoutBtn")?.addEventListener("click", logoutUser);

      // sidebar
      document.getElementById("hrBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=hr-logo");
      document.getElementById("financeBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=finance-logo");
      document.getElementById("itBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=it-logo");
      document.getElementById("performanceBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=performance-logo");
      document.getElementById("reportsBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=reports-logo");

      // filters
      document.getElementById("allBtn")?.addEventListener("click", () => filterTableByStatus("all"));
      document.getElementById("approvedBtn")?.addEventListener("click", () => filterTableByStatus("approved"));
      document.getElementById("pendingBtn")?.addEventListener("click", () => filterTableByStatus("pending"));
      document.getElementById("cancelledBtn")?.addEventListener("click", () => filterTableByStatus("cancelled"));

      // modal close
      document.getElementById("closeModalBtn")?.addEventListener("click", closeModal);

    });

    // load request
    function loadMyRequests() {
      fetch(`/api/leave/my-requests`, { credentials: "include" })
        .then(res => res.json())
        .then(data => {
          console.log("data", data);

          const tbody = document.querySelector("#requestsTable tbody");
          tbody.innerHTML = "";

          data.forEach((req, index) => {

            const tr = document.createElement("tr");

            tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${req.leave_type}</td>
          <td>${new Date(req.from_date).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })}</td>
          <td>${new Date(req.to_date).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })}</td>
          <td><span class="status-box ${(req.status || "").toLowerCase()}">${req.status}</span></td>
        `;

            // ✅ ACTION COLUMN (SAFE)
            const actionTd = document.createElement("td");

            const viewBtn = document.createElement("span");
            viewBtn.className = "icon-box view";
            viewBtn.innerHTML = `<i class="fas fa-eye"></i>`;

            viewBtn.addEventListener("click", () => {
              viewRequest(req.id);
            });

            actionTd.appendChild(viewBtn);
            tr.appendChild(actionTd);

            tbody.appendChild(tr);
          });
        });
    }



    // fiter button work based on table status
    function filterTableByStatus(status) {
      const tbody = document.querySelector("#requestsTable tbody");
      const rows = tbody.querySelectorAll("tr");

      rows.forEach(row => {
        const statusCell = row.querySelector("td:nth-child(5) span.status-box");
        if (!statusCell) return; // safety check

        const rowStatus = statusCell.textContent.trim().toLowerCase();
        if (status === 'all' || rowStatus === status.toLowerCase()) {
          row.style.display = "";  // show row
        } else {
          row.style.display = "none";  // hide row
        }
      });

      setActiveFilterButton(status);
    }

    function setActiveFilterButton(selectedStatus) {
      const buttons = document.querySelectorAll('.status-buttons button');
      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === selectedStatus.toLowerCase());
      });
    }


    // view request
    function viewRequest(id) {
      let cancelledById;

      fetch(`/api/leave/details/${id}`)
        .then(res => res.json())
        .then(d => {
          cancelledById = parseInt(d.cancelled_by);

          const fromDate = new Date(d.from_date).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
          const toDate = new Date(d.to_date).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });

          // Set status tag
          const statusTag = document.getElementById("modalStatusTag");
          statusTag.textContent = d.status;
          statusTag.classList.remove("approved", "pending", "cancelled");
          statusTag.classList.add(d.status.toLowerCase());

          let detailsHtml = `
            <p><strong>Leave Type:</strong> ${d.leave_type}</p>
            <p><strong>From:</strong> ${fromDate}</p>
            <p><strong>To:</strong> ${toDate}</p>
            <p><strong>Status:</strong> ${d.status}</p>
          `;


          // Show medical certificate if exists
          if (d.medical_certificate_url) {
            detailsHtml += `<p><strong>Medical Certificate:</strong> <a href="${d.medical_certificate_url}" target="_blank">View/Download</a></p>`;
          }

          if (d.status === "cancelled") {
            detailsHtml += `
              <p><strong>Cancelled By:</strong> ${d.cancelled_by_name || 'N/A'}</p>
              <p><strong>Cancel Reason:</strong> ${d.cancel_reason || 'N/A'}</p>
            `;
          }

          document.getElementById("requestDetails").innerHTML = detailsHtml;


          // track of leave
          fetch(`/api/leave/track/${id}`)
            .then(res => res.json())
            .then(steps => {
              if (!steps.length) {
                document.getElementById("approvalFlow").innerHTML = "No approval steps.";
                return;
              }

              // 1. Filter by role_name, prioritize "approved" status
              const roleMap = new Map();

              steps.forEach(step => {
                const role = step.role_name;
                const existing = roleMap.get(role);

                if (!existing) {
                  // If role not seen before, add it
                  roleMap.set(role, step);
                } else if (step.status === "approved" && existing.status !== "approved") {
                  // If role already exists but this one is approved and previous one is not, replace
                  roleMap.set(role, step);
                }
              });

              const uniqueSteps = Array.from(roleMap.values());
              console.log(uniqueSteps);

              // 2. Render approval flow by role
              let html = `<div style="display: flex; justify-content: center; align-items: center; flex-wrap: nowrap; overflow-x: auto;">`;

              uniqueSteps.forEach((step, i) => {
                // Show approver name if available, otherwise fall back to role_name
                const name = step.approver_name?.trim() ? step.approver_name : step.role_name || "N/A";
                const status = step.status?.toLowerCase() || "pending";

                // Choose class for color
                let statusClass = "";
                if (status === "approved") statusClass = "status-approved";
                else if (status === "pending") statusClass = "status-pending";
                else if (status === "cancelled" || status === "rejected") statusClass = "status-cancelled";
                else if (status === "skipped") statusClass = "status-skipped";

                html += `
    <div style="text-align: center; margin: 0 10px;">
      <div class="status-square ${statusClass}">
        ${name}
      </div>
      <div class="label">${status}</div>
    </div>
  `;

                if (i < uniqueSteps.length - 1) {
                  html += `<div class="arrow-container"><span class="arrow">➡</span></div>`;
                }
              });

              html += `</div>`;
              document.getElementById("approvalFlow").innerHTML = html;

              // Show the modal
              document.getElementById("viewModal").style.display = "flex";
            });


          document.getElementById("viewModal").style.display = "flex";
        });
    }

    function closeModal() {
      document.getElementById("viewModal").style.display = "none";
    }

    function logoutUser() {
      Swal.fire({ title: "Logging out..." });
      fetch("/api/auth/logout").then(() => location.href = "index.html");
    }

    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const viewId = params.get("view");
      if (viewId) {
        viewRequest(viewId);
      }
    });

    // logout
    function logoutUser() {
      Swal.fire({
        title: "Are you sure?",
        text: "You will be logged out from your session.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Yes, logout",
        cancelButtonText: "Cancel"
      }).then((result) => {
        if (result.isConfirmed) {
          // Call logout API
          fetch("/api/auth/logout")
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                Swal.fire({
                  title: "Logged Out!",
                  text: "You have been successfully logged out.",
                  icon: "success",
                  showConfirmButton: false,
                  timer: 2000
                });

                setTimeout(() => {
                  window.location.href = "index.html"; // Redirect to login
                }, 2000);
              } else {
                Swal.fire("Oops!", "Logout failed. Try again.", "error");
              }
            })
            .catch(err => {
              console.error("Logout error:", err);
              Swal.fire("Error", "Something went wrong. Try again.", "error");
            });
        }
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
