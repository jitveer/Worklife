<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Registration Form</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ===== BASE ===== */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* ===== FORM TOP HEADER ===== */
        .form-top-header {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
            background: #ffffff;
            border-bottom: 2px solid #e0e0e0;
            padding: 15px 20px;
            margin: -40px -40px -33px;
            /* match form padding */
        }

        .form-logo {
            height: 73px;
            width: auto;
        }

        .form-company-name {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #000;
        }

        /* ===== FORM CARD ===== */
        .form-wrapper {
            background: #fff;
            width: 95%;
            max-width: 900px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .form-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        /* ===== PHOTO ===== */
        .employee-photo-container {
            position: absolute;
            top: -50px;
            left: 40px;
        }

        .employee-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
        }

        /* input[type="file"] {
            display: none;
        } */

        /* ===== SECTION TITLE ===== */
        .section-title {
            background: #3ba37b;
            color: #fff;
            padding: 8px;
            margin: 30px -40px 20px;
            text-align: center;
            font-weight: bold;
        }

        /* ===== FORM GRID ===== */
        .form-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            min-width: 220px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #52af8d;
            outline: none;
            box-shadow: 0 0 0 2px rgba(82, 175, 141, 0.2);
        }

        textarea {
            resize: none;
        }

        /* ===== BUTTON ===== */
        .submit-btn {
            margin: 30px auto 0;
            display: block;
            width: 220px;
            padding: 12px;
            background: #126d30;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #0f5b28;
        }

        /* ===== ERROR ===== */
        .error {
            font-size: 12px;
            color: red;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .form-wrapper {
                padding: 20px;
            }

            .employee-photo-container {
                left: 50%;
                transform: translateX(-50%);
            }

            .section-title {
                margin: 30px -20px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="form-wrapper">

        <!-- Employee Photo -->
        <div class="employee-photo-container">
            <img id="employeePhotoPreview" class="employee-photo" src="images/profile.jpg" alt="Profile">
            <input type="file" id="photo" name="photo" accept="image/*" style="display:none;">
        </div>

        <!-- ===== FORM TOP HEADER ===== -->
        <div class="form-top-header">
            <img src="images/log.jpg" alt="MNM Logo" class="form-logo">
            <div class="form-company-name">MNM ENTERPRISES</div>
        </div>

        <form id="employeeForm">

            <!-- hidden name split -->
            <input type="hidden" id="firstName">
            <input type="hidden" id="middleName">
            <input type="hidden" id="lastName">

            <!-- ================= COMPANY DETAILS ================= -->
            <div class="section-title">Company Details</div>

            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-group">
                    <label>Line Manager</label>
                    <select id="linemanagersSelect">
                        <option value="">Select line managers</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Company</label>
                    <select id="companySelect">
                        <option value="">Select Company</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Department</label>
                    <select id="departmentSelect" required>
                        <option value="">Select Department</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select id="roleSelect">
                        <option value="">Select Role</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Designation</label>
                    <input type="text" id="designation" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                    <span id="emailError" class="error"></span>
                </div>
            </div>

            <!-- ================= PERSONAL DETAILS ================= -->
            <div class="section-title">Personal Details</div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div class="form-group">
                    <label>Date of Joining</label>
                    <input type="date" id="doj" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="">Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Aadhar Number</label>
                    <input type="text" id="aadhar" required>
                    <span id="aadharError" class="error"></span>
                </div>

                <div class="form-group">
                    <label>PAN Number</label>
                    <input type="text" id="pan" required>
                    <span id="panError" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" id="mobile" required>
                    <span id="mobileError" class="error"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Blood Group</label>
                    <select id="blood">
                        <option value="">Blood Group</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Marital Status</label>
                    <select id="marital">
                        <option value="">Marital Status</option>
                        <option>Single</option>
                        <option>Married</option>
                        <option>Divorced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" id="pincode">
                    <span id="pincodeError" class="error"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="photo">Upload Employee Photo:</label>
                    <input type="file" id="photo" name="photo" accept="image/*">
                </div>
            </div>

            <!-- ================= ADDRESS ================= -->
            <div class="section-title">Address</div>

            <div class="form-row">
                <div class="form-group">
                    <label>Present Address</label>
                    <textarea id="presentAddress" rows="3"></textarea>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="country" required>
                </div>

                <div class="form-group">
                    <label>State</label>
                    <input type="text" id="state" required>
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Permanent Address</label>
                    <textarea id="permanentAddress" rows="3"></textarea>
                </div>
            </div>

            <!-- ================= EMERGENCY ================= -->
            <div class="section-title">Emergency Contact</div>

            <div class="form-row">
                <div class="form-group">
                    <label>Emergency Name</label>
                    <input type="text" id="emergencyName" required>
                </div>

                <div class="form-group">
                    <label>Emergency Number</label>
                    <input type="text" id="emergencyNumber" required>
                    <span id="emergencyNumberError" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Relation</label>
                    <input type="text" id="emergencyRelation" required>
                </div>
            </div>

            <button type="submit" class="submit-btn green-btn">SUBMIT</button>
        </form>
    </div>


    <script>
        /* ================= PHOTO ================= */
        const photoInput = document.getElementById("photo");
        const photoPreview = document.getElementById("employeePhotoPreview");
        let uploadedPhotoPath = "";

        photoPreview.addEventListener("click", () => {
            photoInput.click();
        });

        photoInput.onchange = async () => {
            const file = photoInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => photoPreview.src = e.target.result;
            reader.readAsDataURL(file);

            const fd = new FormData();
            fd.append("photo", file);

            const res = await fetch("/api/employees/employee/upload-photo", { method: "POST", body: fd });
            const data = await res.json();
            if (data.success) uploadedPhotoPath = data.filePath;
        };

        /* ================= FORM SUBMIT ================= */
        document.getElementById("employeeForm").addEventListener("submit", async e => {
            e.preventDefault();

            //  First: split the full name!
            const fullName = document.getElementById("fullName").value.trim();
            const nameParts = fullName.split(/\s+/);

            let firstName = "";
            let lastName = "";
            let middleName = ""; // always empty for your rule
            if (nameParts.length === 1) {
                firstName = nameParts[0];
            } else {
                firstName = nameParts[0];
                lastName = nameParts.slice(1).join(" ");
            }

            document.getElementById("firstName").value = firstName;
            document.getElementById("middleName").value = middleName;
            document.getElementById("lastName").value = lastName;

            const formData = {
                passcode: "WL" + Math.floor(Math.random() * 100000),
                first_name: document.getElementById("firstName").value.trim(),
                middle_name: document.getElementById("middleName").value.trim(),
                last_name: document.getElementById("lastName").value.trim(),

                line_manager_id: document.getElementById("linemanagersSelect").value,
                company_id: document.getElementById("companySelect").value,
                role_id: document.getElementById("roleSelect").value,
                department_id: document.getElementById("departmentSelect").value,

                designation: document.getElementById("designation").value.trim(),
                email: document.getElementById("email").value.trim(),

                adhar_number: document.getElementById("aadhar").value.trim(), // ✔ confirm backend
                pan_number: document.getElementById("pan").value.trim().toUpperCase(),

                mobile: document.getElementById("mobile").value.trim(),
                dob: document.getElementById("dob").value,
                doj: document.getElementById("doj").value,
                gender: document.getElementById("gender").value,
                blood_group: document.getElementById("blood").value,
                marital_status: document.getElementById("marital").value,
                pincode: document.getElementById("pincode").value,

                present_address: document.getElementById("presentAddress").value.trim(),
                permanent_address: document.getElementById("permanentAddress").value.trim(),
                permanent_country_name: document.getElementById("country").value.trim(),
                permanent_state_name: document.getElementById("state").value.trim(),
                permanent_city_name: document.getElementById("city").value.trim(),

                emergency_contact_name: document.getElementById("emergencyName").value.trim(),
                emergency_contact_number: document.getElementById("emergencyNumber").value.trim(),
                emergency_contact_relationship: document.getElementById("emergencyRelation").value.trim(),

                password: "123456",
                badge_count: 0,
                notification_message: "",
                unread: 1,
                token: "0",
                image: uploadedPhotoPath,
                islogged_in: 0,
                database: "Award"
            };

            const res = await fetch("/api/employees/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            });

            const msg = await res.text();
            Swal.fire("Success", msg, "success");
            document.getElementById("employeeForm").reset();
        });
    </script>
    <script>
        /* ===============================
           LOAD DROPDOWNS (PUBLIC FORM)
        ================================ */

        // Companies
        fetch("/api/employees/getAllCompanies")
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("companySelect");
                select.innerHTML = `<option value="">Select Company</option>`;
                data.forEach(comp => {
                    const opt = document.createElement("option");
                    opt.value = comp.id;
                    opt.textContent = comp.company_name;
                    select.appendChild(opt);
                });
            })
            .catch(err => console.error("Company load error", err));


        // Departments
        fetch("/api/employees/department")
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("departmentSelect");
                select.innerHTML = `<option value="">Select Department</option>`;
                data.forEach(dep => {
                    const opt = document.createElement("option");
                    opt.value = dep.id;
                    opt.textContent = dep.department_name;
                    select.appendChild(opt);
                });
            })
            .catch(err => console.error("Department load error", err));


        // Roles
        fetch("/api/employees/getAllRoles")
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("roleSelect");
                select.innerHTML = `<option value="">Select Role</option>`;
                data.forEach(role => {
                    const opt = document.createElement("option");
                    opt.value = role.id;
                    opt.textContent = role.role;
                    select.appendChild(opt);
                });
            })
            .catch(err => console.error("Role load error", err));


        // Line Managers
        fetch("/api/employees/linemanagers")
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("linemanagersSelect");
                select.innerHTML = `<option value="">Select Line Manager</option>`;
                data.forEach(mgr => {
                    const opt = document.createElement("option");
                    opt.value = mgr.id;
                    opt.textContent = mgr.name;
                    select.appendChild(opt);
                });
            })
            .catch(err => console.error("Line manager load error", err));
    </script>


</body>

</html>
