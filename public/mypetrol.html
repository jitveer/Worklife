<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title> My Petrol Conveyance</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- SweetAlert2 for logout -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /*-----------------------------------
            Global
        ----------------------------------- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #dff5e4, #f8fffb, #e0f2df);
            background-size: cover;
            background-attachment: fixed;
            color: #333;
        }

        /*-----------------------------------
            Header
        ----------------------------------- */
        .header {
            background: linear-gradient(90deg, #3a9d79, #52af8d);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            height: 56px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .logo-box {
            background-color: #ffffff;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            padding: 6px 14px;
            border-radius: 8px;
            margin-right: 12px;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.15);
        }

        .worklife-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header select {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            background-color: white;
            color: #444;
            font-weight: 600;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.15);
        }

        /* -----------------------------------
           Layout
        ----------------------------------- */
        .main {
            display: flex;
            padding-top: 10px;
        }

        .left-panel {
            width: 110px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        /* -----------------------------------
            Left Panel Buttons
        ----------------------------------- */
        .left-panel button {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 0px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .left-panel button:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }

        .left-panel i {
            font-size: 23px;
            margin-bottom: 6px;
        }

        /* Button colors */
        .btn-hr {
            background-color: #7f6aa8;
        }

        .btn-finance {
            background-color: #cb7e56;
        }

        .btn-it {
            background-color: #773631;
        }

        .btn-pm {
            background-color: #138f6c;
        }

        .btn-reports {
            background-color: #71a92c;
        }

        /* -----------------------------------
            Content
        ----------------------------------- */
        .content {
            flex: 1;
            padding: 30px;
            background-color: #ffffff;
            margin: 10px 10px 10px 0px;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .content h1 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #52af8d;
            font-weight: bold;
        }

        /* -----------------------------------
           Status Buttons
        ----------------------------------- */
        .status-buttons button {
            background: #ffffff;
            border: 2px solid #d0d0d0;
            padding: 10px 20px;
            margin-right: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .status-buttons button:hover {
            background-color: #5654ce;
            color: #fff;
            border-color: #3a9d79;
        }

        /* -----------------------------------
           Table
        ----------------------------------- */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            background-color: #3a9d79;
            color: white;
            padding: 12px;
            font-size: 15px;
            border-right: 1px solid #dcdcdc;
        }

        td {
            background-color: #ffffff;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            border-right: 1px solid #5dbd98;
        }

        tr:hover td {
            background-color: #e4f3eb;
        }

        /* -----------------------------------
            Status Box
        ----------------------------------- */
        .status-box {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
            display: inline-block;
        }

        .status-box.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-box.approved {
            background: #d4edda;
            color: #155724;
        }

        .status-box.rejected {
            background: #f8d7da;
            color: #721c24;
        }

        /* -----------------------------------
             Action icons
        ----------------------------------- */
        .action-icons {
            display: flex;
            gap: 12px;
        }

        .icon-box {
            padding: 8px;
            border-radius: 7px;
            background-color: #f1f1f1;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .icon-box:hover {
            transform: scale(1.1);
        }

        .icon-box.view:hover {
            background-color: #3a9d79;
            color: white;
        }

        /* -----------------------------------
            Modal
        ----------------------------------- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #ffffff;
            width: 480px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }

        .close-btn i {
            color: red;
        }

        /* Tracking Flow */
        #petrolApprovalFlow {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

    <!-- === HEADER === -->
    <header>
        <div class="header">
            <!-- Left -->
            <div id="headerLogo" class="header-left">
                <div class="logo-box">WL</div>
                <div class="worklife-text">Worklife</div>
            </div>
            <!-- Right -->
            <div class="header-right">
                <select>
                    <option>Eastern</option>
                    <option>Western</option>
                    <option>Northern</option>
                    <option>Southern</option>
                </select>
                <span>English</span>
                <div class="profile">
                    <i class="fa-solid fa-circle-user"></i>
                    <span id="userName" style="text-transform: capitalize;">Loading...</span>
                </div>
                <div class="logout" id="logoutBtn">
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- === MAIN === -->
    <div class="main">
        <!-- LEFT PANEL -->
        <div id="sidePanel" class="left-panel">
            <button class="btn-hr" id="hrBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-regular fa-user"></i>
                    <span>HR</span>
                </div>
            </button>
            <button class="btn-finance" id="financeBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-regular fa-folder"></i>
                    <span>Finance</span>
                </div>
            </button>
            <button class="btn-it" id="itBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-solid fa-desktop"></i>
                    <span>IT</span>
                </div>
            </button>
            <button class="btn-pm" id="performanceBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-solid fa-clock"></i>
                    <span>Performance</span>
                </div>
            </button>
            <button class="btn-reports" id="reportsBtn">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-solid fa-chart-bar"></i>
                    <span>Reports</span>
                </div>
            </button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <h1>My Petrol Conveyance</h1>

            <div class="status-buttons">
                <button id="allBtn">All</button>
                <button id="approvedBtn">Approved</button>
                <button id="pendingBtn">Pending</button>
                <button id="rejectedBtn">Rejected</button>
            </div>


            <table id="petrolTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Requested By</th>
                        <th>Location</th>
                        <th>Admin Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic rows go here -->
                </tbody>
            </table>
        </div>
    </div>


    <!-- PETROL MODAL -->
    <div id="petrolModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">
                <i class="fa-solid fa-rectangle-xmark"></i>
            </span>
            <h2>Petrol Claim Details <span id="petrolStatusTag" class="status-box small"></span></h2>

            <p><b>Requester Name:</b> <span id="petrolRequesterName">-</span></p>
            <p><b>Request No:</b> <span id="petrolReqNo">-</span></p>

            <!-- Only shown if rejected -->
            <div id="petrolRejectSection" style="display:none; margin-top:10px;">
                <p><b>Rejected By:</b> <span id="petrolRejectedBy">-</span></p>
                <p><b>Rejection Reason:</b> <span id="petrolRejectionReason">-</span></p>
            </div>
            <div id="petrolApprovalFlow" style="margin-top: 15px;"></div>
        </div>
    </div>


    <script>
        let currentPetrolRequestId = null;
        let loggedInUserId = sessionStorage.getItem("user_id"); // Make sure user_id is set

        function loadRequests(status = 'all') {
            fetch(`/api/petrol/my-claims?status=${status}`, { credentials: "include" })
                .then(res => res.json())
                .then(data => {
                    const tableBody = document.querySelector("#petrolTable tbody");
                    tableBody.innerHTML = ""; // Clear old rows

                    if (data.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No petrol claims found</td></tr>`;
                        return;
                    }

                    data.forEach((claim, index) => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${claim.requester_name || "-"}</td>
                    <td>${claim.locations || "-"}</td>
                    <td>
                        <span class="status-box small ${claim.final_status ? claim.final_status.toLowerCase() : 'pending'}">
                            ${claim.final_status || 'Pending'}
                        </span>
                    </td>
                `;
                        const actionTd = document.createElement("td");

                        const btn = document.createElement("button");
                        btn.className = "icon-box view";
                        btn.innerHTML = `<i class="fa-solid fa-eye"></i>`;

                        btn.addEventListener("click", () => {
                            viewPetrol(claim.req_no);
                        });

                        actionTd.appendChild(btn);
                        row.appendChild(actionTd);

                        tableBody.appendChild(row);
                    });
                })
                .catch(err => console.error("Error loading petrol claims:", err));
        }


        //  VIEW PETROL MODAL 
        function viewPetrol(reqNo) {
            currentPetrolRequestId = reqNo;

            fetch(`/api/petrol/claims/${reqNo}`, { credentials: "include" })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("petrolRequesterName").textContent = data.requester_name || "N/A";
                    document.getElementById("petrolReqNo").textContent = data.requester_no || "-";

                    // Status
                    const statusTag = document.getElementById("petrolStatusTag");
                    const claimStatus = data.status || data.final_status || "Pending";
                    statusTag.textContent = claimStatus;
                    statusTag.className = `status-box small ${claimStatus.toLowerCase()}`;

                    const rejectDiv = document.getElementById("petrolRejectSection");
                    if (rejectDiv) {
                        if (data.status && data.status.toLowerCase() === "rejected") {
                            rejectDiv.style.display = "block";
                            document.getElementById("petrolRejectedBy").textContent = data.rejected_by_name || "N/A";
                            document.getElementById("petrolRejectionReason").textContent = data.rejection_reason || "N/A";
                        } else {
                            rejectDiv.style.display = "none";
                        }
                    }

                    // Show modal
                    document.getElementById("petrolModal").style.display = "flex";

                    trackPetrolApproval(reqNo);
                })
                .catch(err => Swal.fire("Error", "Unable to load petrol claim details.", "error"));
        }

        //  CLOSE MODAL 
        function closePetrolModal() {
            document.getElementById("petrolModal").style.display = "none";
        }

        // Close when clicking outside the modal content
        const petrolModal = document.getElementById("petrolModal");
        petrolModal.addEventListener("click", function (event) {
            if (event.target === petrolModal) closePetrolModal();
        });

        // INITIAL LOAD 
        window.onload = () => {
            loadRequests('all');

            const reqNo = new URLSearchParams(window.location.search).get("reqNo");
            if (reqNo) setTimeout(() => viewPetrol(reqNo), 300);
        };


        //  TRACK PETROL APPROVAL 
        function trackPetrolApproval(reqNo) {
            fetch(`/api/petrol/track/${reqNo}`)
                .then(res => res.json())
                .then(steps => {
                    const container = document.getElementById("petrolApprovalFlow");
                    if (!steps.length) {
                        container.innerHTML = "No approval steps.";
                        return;
                    }

                    let html = `<div style="display: flex; justify-content: center; align-items: center; flex-wrap: nowrap; overflow-x: auto;">`;

                    steps.forEach((step, i) => {
                        const name = step.approved_by_name || "N/A";
                        const status = step.status?.toLowerCase() || "pending";

                        let color = "#ddd";
                        if (status === "approved") color = "#28a745";
                        else if (status === "pending") color = "#ffc107";
                        else if (status === "rejected") color = "#dc3545";
                        else if (status === "skipped") color = "#6c757d";

                        html += `
                    <div style="display: flex; flex-direction: column; align-items: center; margin: 0 10px;">
                        <div style="
                            padding: 10px 16px;
                            background: ${color};
                            color: #fff;
                            border-radius: 4px;
                            font-weight: bold;
                            min-width: 130px;
                            text-align: center;
                            white-space: nowrap;
                        ">
                            ${name}
                        </div>
                        <div style="font-size: 14px; font-weight: bold; margin-top: 6px; text-transform: capitalize;">
                            ${status}
                        </div>
                    </div>
                `;

                        if (i < steps.length - 1) {
                            html += `<div style="display: flex; align-items: center; font-size: 24px; margin-top: -26px;">➡</div>`;
                        }
                    });

                    html += `</div>`;
                    container.innerHTML = html;
                })
                .catch(err => {
                    console.error("Failed to load tracking info:", err);
                });
        }

    </script>

    <script>
        fetch("/api/auth/session-check", {
            method: "GET",
            credentials: "include"   // ⭐ VERY IMPORTANT
        })
            .then(res => res.json())
            .then(data => {

                if (!data.loggedIn) {
                    window.location.href = "index.html";
                    return;
                }

                // ✅ Username
                document.getElementById("userName").textContent = data.user.name;

                // ✅ Store user id
                sessionStorage.setItem("user_id", data.user.user_id);

                // ===============================
                // ✅ HEADER REDIRECT
                // ===============================
                const header = document.getElementById("headerLogo");

                if (header) {
                    header.addEventListener("click", () => {
                        window.location.href =
                            data.user.roleId === 4
                                ? "employee-dashboard.html"
                                : "humanresource.html";
                    });
                }

                // ===============================
                // ✅ SIDEBAR CHANGE
                // ===============================
                if (data.user.roleId === 4) {

                    const panel = document.getElementById("sidePanel");

                    if (panel) {
                        panel.innerHTML = `

            <button class="btn-hr" id="leaveBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Leave</span>
                </div>
            </button>

            <button class="btn-finance" id="expenseBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-money-bill"></i>
                    <span>Expense</span>
                </div>
            </button>

            <button class="btn-it" id="petrolBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-gas-pump"></i>
                    <span>Petrol</span>
                </div>
            </button>

            <button class="btn-pm" id="salesBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Incentive</span>
                </div>
            </button>

            <button class="btn-reports" id="performanceBtn2">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-chart-column"></i>
                    <span>Performance</span>
                </div>
            </button>

            <!-- 🔵 Blue Certificate -->
            <button class="btn-reports" style="background-color:#0d6efd;" id="certificateBtn">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <i class="fa-solid fa-certificate"></i>
                    <span>Certificate</span>
                </div>
            </button>

            `;

                        document.getElementById("leaveBtn")?.addEventListener("click", () => location.href = "LeaveRequest.html");
                        document.getElementById("expenseBtn")?.addEventListener("click", () => location.href = "expense-claim.html");
                        document.getElementById("petrolBtn")?.addEventListener("click", () => location.href = "petrol-conveyance.html");
                        document.getElementById("salesBtn")?.addEventListener("click", () => location.href = "sales.html");
                        document.getElementById("performanceBtn2")?.addEventListener("click", () => location.href = "performance.html");
                        document.getElementById("certificateBtn")?.addEventListener("click", () => location.href = "certificate.html");

                    }
                }

            })
            .catch(error => {
                console.error("Session check failed:", error);
                window.location.href = "index.html";
            });


        // onclick buttons 
        document.addEventListener("DOMContentLoaded", () => {

            loadRequests("all");

            // logout
            document.getElementById("logoutBtn")?.addEventListener("click", logoutUser);

            // filters
            document.getElementById("allBtn")?.addEventListener("click", () => loadRequests("all"));
            document.getElementById("approvedBtn")?.addEventListener("click", () => loadRequests("approved"));
            document.getElementById("pendingBtn")?.addEventListener("click", () => loadRequests("pending"));
            document.getElementById("rejectedBtn")?.addEventListener("click", () => loadRequests("rejected"));

            // modal close
            document.getElementById("closeModalBtn")?.addEventListener("click", closePetrolModal);

            // sidebar
            document.getElementById("hrBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=hr-logo");
            document.getElementById("financeBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=finance-logo");
            document.getElementById("itBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=it-logo");
            document.getElementById("performanceBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=performance-logo");
            document.getElementById("reportsBtn")?.addEventListener("click", () => location.href = "humanresource.html?section=reports-logo");

        });



        // logout
        function logoutUser() {
            Swal.fire({
                title: "Are you sure?",
                text: "You will be logged out from your session.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Yes, logout",
                cancelButtonText: "Cancel"
            }).then((result) => {
                if (result.isConfirmed) {
                    // Call logout API
                    fetch("/api/auth/logout")
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                Swal.fire({
                                    title: "Logged Out!",
                                    text: "You have been successfully logged out.",
                                    icon: "success",
                                    showConfirmButton: false,
                                    timer: 2000
                                });

                                setTimeout(() => {
                                    window.location.href = "index.html"; // Redirect to login
                                }, 2000);
                            } else {
                                Swal.fire("Oops!", "Logout failed. Try again.", "error");
                            }
                        })
                        .catch(err => {
                            console.error("Logout error:", err);
                            Swal.fire("Error", "Something went wrong. Try again.", "error");
                        });
                }
            });
        }
    </script>
</body>

</html>
