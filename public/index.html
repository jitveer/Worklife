<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Worklife HR Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@300&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="container">

    <!-- Left Side -->
    <div class="left-box">
      <!-- Logo and Title -->
      <div class="logo-row">
        <div class="logo-icon">WL</div>
        <div class="logo-text">Worklife</div>
      </div>

      <!-- Welcome Text -->
      <div class="center-text">
        <p>Welcome to</p>
        <strong>HR Portal</strong>
      </div>

      <!-- Support Link -->
      <a href="#" class="support-link">
        <i class="fa-solid fa-headset"></i> Support
      </a>
    </div>

    <!-- Right Side -->
    <div class="right-box">
      <form id="CompanyLoginForm">
        <label for="company">Company Name</label>
        <select id="company">
          <option value="javascript:(0)" disabled selected>Select your company</option>
          <option value="1">MNM Reality Pvt.Ltd</option>
          <option value="2">MNM Enterprises</option>
        </select>
        <span id="companyError" class="error-text"></span>

        <label for="role">Role</label>
        <select id="role">
          <option value="javascript:(0)" disabled selected>Select your role</option>
          <option value="1">Super Admin</option>
          <option value="2">Admin</option>
          <option value="3">HR</option>
          <option value="4">Employee</option>
        </select>
        <span id="roleError" class="error-text"></span>

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email address" />
        <span id="emailError" class="error-text"></span>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
        <span id="passwordError" class="error-text"></span>

        <button type="submit" class="login-btn">
          <i class="fa-solid fa-lock"></i> <span>Login</span> 
        </button>
      </form>
    </div>
  </div>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <script src="/js/index.js"></script>

</body>

</html>
