<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee List</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
    }

    /* === HEADER === */
    .header {
      background-color: #52af8d;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      height: 50px;
    }

    .header-left {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-box {
      background-color: white;
      color: black;
      font-weight: bold;
      font-size: 18px;
      padding: 6px 12px;
      border-radius: 4px;
      margin-right: 10px;
    }

    .worklife-text {
      font-size: 20px;
      font-weight: bold;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header select {
      background-color: white;
      border: 1px solid white;
      color: rgb(10, 10, 10);
      padding: 4px 6px;
      border-radius: 4px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logout {
      cursor: pointer;
    }

    /* === MAIN === */
    .main {
      display: flex;
    }

    /* === LEFT PANEL === */
    .left-panel {
      display: flex;
      flex-direction: column;
      padding: 25px;
    }

    .left-panel button {
      width: 110px;
      height: 100px;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 0px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .left-panel button:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }

    .btn-hr {
      background-color: #a493b9;
    }

    .btn-finance {
      background-color: #c78864;
    }

    .btn-it {
      background-color: #863f33;
    }

    .btn-pm {
      background-color: #15ac7f;
    }

    .btn-reports {
      background-color: #82b435;
    }

    .btn-employee {
      background-color: #0f739b;
    }

    /* .btn-users {
      background-color: #bd47a3;
    } */

    .left-panel i {
      font-size: 30px;
      margin-bottom: 5px;
    }

    /* === CONTENT === */
    .content {
      flex: 1;
      padding: 30px;
    }

    .content-box {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
      animation: fadeIn 0.4s ease;
      width: 100%;
      max-width: 100%;
    }

    /* HEADER INSIDE CONTENT */
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .add-btn {
      background: #6b5dc5;
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-btn:hover {
      background: #584bb0;
      transform: translateY(-2px);
    }

    .search-input {
      padding: 10px;
      width: 250px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    /* MODERN TABLE */
    .table-container {
      margin-top: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
      font-size: 15px;
    }

    table thead {
      background: #2f3b4b;
      color: white;
    }

    table th {
      padding: 14px;
      background: #3d4f63;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    table tbody tr {
      background: white;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      border-radius: 12px;
    }

    table td {
      padding: 14px;
    }

    table tbody tr:hover {
      background: #f0f7ff;
      transition: 0.2s;
    }

    .action-icons {
      display: flex;
      gap: 20px;
    }

    .icon-box {
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      color: rgb(14, 13, 13);
      background-color: transparent;
      transition: background-color 0.3s ease, color 0.3s ease, transform 0.2s ease;
    }

    /* Hover Effects */
    .icon-box.view:hover {
      background-color: #48c6cf;
      color: rgb(102, 93, 93);
    }

    .icon-box.edit:hover {
      background-color: #ffc107;
      color: rgb(82, 75, 75);
    }

    .icon-box.delete:hover {
      background-color: #c75a65;
      color: rgb(70, 64, 64);
    }

    .icon-box.send:hover {
      background-color: #5bda3c;
      color: rgb(70, 64, 64);
    }

    /* Optional: pop effect */
    .icon-box:hover {
      transform: scale(1.1);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.5);
    }

    /* Modal box itself (width / position remains same) */
    .modal-content {
      position: relative;
      background-color: #ffffff;
      margin: 50px auto;
      padding: 40px;
      border-radius: 0px;
      width: 95%;
      max-width: 800px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.3s ease;
    }

    .modal-header {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 15px;
      text-align: center;
      color: #333;
    }

    .input[readonly] {
      cursor: not-allowed;
    }

    /* ======= GENERIC FORM GRID ======= */

    .form-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    /* 3 columns (used in Add Employee like screenshot) */
    .form-row.form-row-3 .form-group {
      flex: 0 0 33.333%;
      min-width: 0;
    }

    /* 2 columns (used in Create User like screenshot) */
    .form-row.form-row-2 .form-group {
      flex: 0 0 50%;
      min-width: 0;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 200px;
    }

    .form-group label {
      margin-bottom: 6px;
      font-weight: 600;
      color: #111;
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 10px 12px;
      border: 1px solid #cfcfcf;
      border-radius: 0px;
      font-size: 14px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #52af8d;
      box-shadow: 0 0 0 2px rgba(82, 175, 141, 0.2);
      outline: none;
    }

    /* ======= GREEN SECTION BARS (Add Employee screenshot) ======= */

    .employee-section-title {
      background-color: #3ba37b;
      color: #ffffff;
      font-weight: 700;
      text-align: center;
      padding: 8px 0;
      margin: 18px -40px 15px;
      /* extend to modal edges (padding = 40px) */
      font-size: 16px;
    }

    /* Remove extra top margin for first section under modal-header */
    .employee-section-title:first-of-type {
      margin-top: 10px;
    }

    /* ======= CREATE USERS HEADER STRIP ======= */

    #createUserModalContent .create-user-header-strip {
      background-color: #3ba37b;
      color: #fff;
      text-align: center;
      padding: 10px 0;
      margin: 0 -40px 25px;
      font-weight: 700;
      font-size: 16px;
    }

    #createUserModalContent .form-row.form-row-2 .form-group {
      flex: 0 0 48% !important;
      min-width: unset !important;
    }

    /* Purple button like screenshot */
    .submit-btn {
      display: block;
      width: 200px;
      padding: 12px 0;
      margin: 24px auto 0;
      border: none;
      border-radius: 0px;
      font-size: 16px;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .green-btn {
      background: #126d30;
    }

    .blue-btn {
      background: #6b3bb8;
      /* purple tone like mockup */
    }

    .submit-btn:hover {
      transform: translateY(-2px);
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      cursor: pointer;
      font-size: 22px;
    }

    .close-btn i {
      color: #c75a65;
      transition: transform 0.2s ease;
    }

    .close-btn:hover i {
      transform: rotate(90deg);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }



    /* Container positions the photo at the top-left like screenshot */
    .employee-photo-container {
      position: absolute;
      top: -40px;
      left: -40px;
      z-index: 10;
    }

    /* Circle image preview */
    .employee-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      background-color: #fff;
    }

    #addModalContent {
      position: relative;
      /* required */
    }






    @media (max-width: 768px) {

      /* ===========================
     HEADER
    ============================ */
      .header {
        padding: 6px 8px;
      }

      .logo-box {
        font-size: 12px;
        padding: 3px 6px;
      }

      .worklife-text {
        font-size: 14px;
      }

      .header-right {
        gap: 4px;
        font-size: 11px;
      }

      .profile span {
        font-size: 10px;
      }

      .header select {
        font-size: 10px;
        padding: 3px 4px;
      }

      /* ===========================
     LEFT PANEL ICON BAR
    ============================ */
      .left-panel {
        width: 45px !important;
        padding: 5px;
      }

      .left-panel button {
        width: 42px !important;
        height: 42px !important;
      }

      .left-panel i {
        font-size: 16px !important;
      }

      /* remove text below icon entirely */
      .left-panel button span {
        display: none !important;
      }

      .left-panel button:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      }

      /* ===========================
   EMPLOYEE HEADER — ALWAYS 1 ROW
=========================== */
      .content-box {
        width: 100% !important;
        max-width: 100% !important;
        overflow-x: hidden !important;
        padding: 25px !important;
        box-sizing: border-box;
      }


      .content-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 8px;
        align-items: flex-start;
        width: 100%;
      }

      /* Title stays on top */
      .content-header h3 {
        font-size: 14px !important;
        text-align: left !important;
        margin: 0;
      }

      /* ACTION BAR ALWAYS 1 ROW */
      .content-header>div {
        display: flex;
        align-items: flex-start;
        gap: 5px;
        width: 100%;
        flex-wrap: nowrap;
      }

      /* SEARCH stays flexible */
      .search-input {
        flex: 1;
        min-width: 70px;
        padding: 5px !important;
        font-size: 10px !important;
      }

      /* BUTTONS SHRINK INSTEAD OF WRAP */
      .add-btn,
      .content-header a {
        flex: 0 0 auto;
        padding: 5px !important;
        font-size: 8px !important;
        height: 28px !important;
        border-radius: 4px !important;
        white-space: nowrap;
      }

      .content-header a {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;

        padding: 3px !important;
        height: 24px !important;
        font-size: 8px !important;
        border-radius: 3px !important;
        min-width: 60px;
        max-width: 70px;
        white-space: nowrap;
      }

      /* ===========================
       TABLE (NO SCROLL)
      ============================ */
      table {
        width: 100% !important;
        font-size: 10px !important;
        border-collapse: collapse;
      }

      table th,
      table td {
        padding: 4px 3px !important;
      }

      table td:last-child {
        text-align: center;
      }

      /* HIDE UNUSED COLUMNS */
      th:nth-child(4),
      th:nth-child(5),
      th:nth-child(6),
      th:nth-child(7),
      td:nth-child(4),
      td:nth-child(5),
      td:nth-child(6),
      td:nth-child(7) {
        display: none !important;
      }

      table tbody tr:hover {
        background-color: #e6f7ff;
      }

      /* Action icons Hover Effects */
      .icon-box.view:hover {
        background-color: #48c6cf;
        color: rgb(102, 93, 93);
      }

      .icon-box.edit:hover {
        background-color: #ffc107;
        color: rgb(82, 75, 75);
      }

      .icon-box.delete:hover {
        background-color: #c75a65;
        color: rgb(70, 64, 64);
      }

      .icon-box.send:hover {
        background-color: #5bda3c;
        color: rgb(70, 64, 64);
      }

      /* Optional: pop effect */
      .icon-box:hover {
        transform: scale(1.1);
      }

      /* add employee form */
      .modal-content {
        width: 80% !important;
        margin: 20px auto;
        padding: 12px !important;
      }

      .employee-section-title {
        margin: 15px -12px 10px;
        font-size: 14px;
      }

      #createUserModalContent .create-user-header-strip {
        margin: 0 -12px 15px;
        font-size: 14px;
      }

      /* FORM STACKS VERTICALLY */
      .form-row {
        flex-direction: column !important;
        gap: 8px !important;
      }

      .form-group {
        min-width: 100%;
      }

      .form-group label {
        font-size: 12px !important;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 98%;
        font-size: 12px !important;
        padding: 6px !important;
      }

      /* REDUCE TEXTAREA HEIGHT */
      textarea {
        min-height: 60px;
      }

      /* SUBMIT BUTTON FULL WIDTH */
      .submit-btn {
        width: 40% !important;
        font-size: 14px !important;
        padding: 10px !important;
      }

      /* CLOSE BUTTON SMALLER */
      .close-btn {
        font-size: 14px !important;
        top: 5px;
        right: 5px;
      }

      /* HEADER SMALLER */
      .modal-header {
        font-size: 16px !important;
        text-align: center;
        padding-bottom: 10px;
      }

      /* dropdown box same width as other input box */
      #addModalContent .form-group input,
      #addModalContent .form-group select,
      #addModalContent .form-group textarea,
      #createUserModalContent .form-group input,
      #createUserModalContent .form-group select,
      #createUserModalContent .form-group textarea {
        width: 98% !important;
        box-sizing: border-box !important;
      }



      .employee-photo-container {
        left: 50%;
        top: -30px;
        transform: translateX(-50%);
      }

      .employee-photo {
        width: 90px;
        height: 90px;
      }

      .modal-header {
        margin-top: 60px !important;
      }
    }
  </style>
</head>

<body>
  <!-- === HEADER === -->
  <header>
    <div class="header">
      <div class="header-left" id="goDashboard">
        <div class="logo-box">WL</div>
        <div class="worklife-text">Worklife</div>
      </div>
      <div class="header-right">
        <select>
          <option>Eastern</option>
          <option>Western</option>
          <option>Northern</option>
          <option>Southern</option>
        </select>
        <span>English</span>
        <div class="profile">
          <i class="fa-solid fa-circle-user"></i>
          <span id="userName">Loading...</span>
        </div>
        <div class="logout" id="logoutBtn">
          <i class="fas fa-power-off"></i>
        </div>
      </div>
    </div>
  </header>

  <!-- === MAIN === -->
  <div class="main">
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <button class="btn-hr" id="hrBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-regular fa-user"></i><span>HR</span>
        </div>
      </button>
      <button class="btn-finance" id="financeBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-regular fa-folder"></i><span>Finance</span>
        </div>
      </button>
      <button class="btn-it" id="itBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-solid fa-desktop"></i><span>IT</span>
        </div>
      </button>
      <button class="btn-pm" id="performanceBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-solid fa-clock"></i><span>Performance</span>
        </div>
      </button>
      <button class="btn-reports" id="reportsBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fa-solid fa-chart-bar"></i><span>Reports</span>
        </div>
      </button>
      <button class="btn-employee" id="employeetableBtn">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <i class="fas fa-users"></i><span>Employee</span>
        </div>
      </button>
    </div>

    <div class="content-box">
      <div class="content-header">
        <h3 id="tableTitle">Employees List</h3>

        <span class="icon-box send" id="sendMailBtn">
          send mail
        </span>

        <div>
          <input type="text" class="search-input" id="searchInput" placeholder="Search by name or department">
          <button class="add-btn" id="addEmployeeBtn">+ Add
            Employee</button>
          <button class="add-btn" style="background-color: #4caf50;" id="createUserBtn">+ Create
            User</button>
          <a href="create-users.html" class="add-btn"
            style="background-color: #2196f3; color: white; text-decoration: none; padding: 8px 12px; font-size:14px; border-radius: 10px; display: inline-block;">Update
            Users</a>
        </div>
      </div>

      <!--  EMPLOYEE SECTION -->
      <div id="table-section" class="table-container">
        <table id="employeeTable" border="2" width="100%">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Department</th>
              <th>Designation</th>
              <th>DOB</th>
              <th>DOJ</th>
              <th>Mobile</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="employeeBody"></tbody>
        </table>
      </div>

      <div class="modal" id="addModal" style="display: none;">
        <div class="modal-content animate__animated animate__backInDown" id="addModalContent">
          <span class="close-btn" id="closeAddModalBtn">
            <i class="fa-solid fa-rectangle-xmark"></i>
          </span>
          <div class="modal-header">Add Employee Details</div>
          <form id="employeeForm">

            <!-- Employee Photo Upload (Dynamic Circle Preview) -->
            <div class="employee-photo-container">
              <img id="employeePhotoPreview" class="employee-photo" src="images/profile.jpg" alt="Profile">
            </div>

            <input type="hidden" id="firstName">
            <input type="hidden" id="middleName">
            <input type="hidden" id="lastName">

            <!-- 🔹 Section: Company Details -->
            <div class="employee-section-title">Company Details</div>

            <div class="form-row">
              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required>
              </div>
              <div class="form-group">
                <label for="linemanagersSelect">Line Manager</label>
                <select id="linemanagersSelect">
                  <option value="">Select line managers</option>
                </select>
              </div>
              <div class="form-group">
                <label for="companySelect">Company</label>
                <select id="companySelect">
                  <option value="">Select Company</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="departmentSelect">Department</label>
                <select id="departmentSelect" required>
                  <option value="">Select Department</option>
                </select>
              </div>
              <input type="hidden" id="departmentName">
              <div class="form-group">
                <label for="roleSelect">Role</label>
                <select id="roleSelect">
                  <option value="">Select Role</option>
                </select>
              </div>
              <div class="form-group">
                <label for="designation">Designation</label>
                <input type="text" id="designation" placeholder="Designation" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email">Company Email</label>
                <input type="email" id="email" required>
                <span id="emailError" style="color: red; font-size: 12px;"></span>
              </div>
            </div>

            <!-- 🔹 Section: Personal Details -->
            <div class="employee-section-title">Personal Details</div>

            <div class="form-row">
              <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required>
              </div>
              <div class="form-group">
                <label for="doj">Date of Joining</label>
                <input type="date" id="doj" required>
              </div>
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                  <option value="">Gender</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="aadhar">Aadhar Number</label>
                <input type="text" id="aadhar" required>
                <span id="aadharError" style="color: red; font-size: 12px;"></span>
              </div>
              <div class="form-group">
                <label for="pan">PAN Number</label>
                <input type="text" id="pan" required>
                <span id="panError" style="color: red; font-size: 12px;"></span>
              </div>
              <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="text" id="mobile" required>
                <span id="mobileError" style="color: red; font-size: 12px;"></span>
              </div>

        function formatDate(dateString) {
          const date = new Date(dateString);
          if (isNaN(date)) return "";
          const day = String(date.getDate()).padStart(2, "0");
          const month = String(date.getMonth() + 1).padStart(2, "0"); // 0-based months
          const year = date.getFullYear();
          return `${day}-${month}-${year}`;
        }

            modal.style.display = "none"; // hide modal

            modalContent.classList.remove("animate__zoomOutDown");

            // Remove this handler so it doesn't stack up

        function filterVisibleTable(tableId, input) {
          let table = document.getElementById(tableId);
          let rows = table.getElementsByTagName("tr");

          for (let i = 1; i < rows.length; i++) {
            let row = rows[i];
            let cells = row.getElementsByTagName("td");
            let found = false;

            for (let j = 0; j < cells.length; j++) {
              let text = cells[j].innerText.toLowerCase();
              if (text.includes(input)) {
                found = true;
                break;
              }
            }

            row.style.display = found ? "" : "none";
          }
        }

            for (let j = 0; j < cells.length; j++) {

              if (text.includes(input)) {

                break;
              }
            }

            row.style.display = found ? "" : "none";
          }
        }

        // DELETE EMPLOYEE
        function deleteEmployee(id) {
          Swal.fire({
            title: "Are you sure?",
            text: "This employee will be permanently deleted.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33",
            cancelButtonColor: "#3085d6",
            confirmButtonText: "Yes, delete it!",
            cancelButtonText: "Cancel"
          }).then((result) => {
            if (result.isConfirmed) {
              fetch(`/api/employees/delete/${id}`, {
                method: "DELETE"
              })
                .then(res => res.text())
                .then(msg => {
                  Swal.fire({
                    title: "Deleted!",
                    text: msg,
                    icon: "success",
                    confirmButtonText: "OK"
                  });

                  //  Remove row from DOM
                  const row = document.querySelector(`tr[data-id="${id}"]`);
                  if (row) row.remove();
                })
                .catch(err => {
                  Swal.fire({
                    title: "Error!",
                    text: "Error deleting employee: " + err,
                    icon: "error",
                    confirmButtonText: "OK"
                  });
                });
            }
          });
        }

        // SEND PASSCODE
        function sendPasscode(email) {
          fetch("/api/auth/send-passcode", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
          })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                Swal.fire({
                  title: "Passcode Sent!",
                  text: data.message,
                  icon: "success",
                  confirmButtonText: "OK"
                });
              } else {
                Swal.fire({
                  title: "Error!",
                  text: data.message || "Failed to send passcode.",
                  icon: "error",
                  confirmButtonText: "OK"
                });
              }
            })
            .catch(() => {
              Swal.fire({
                title: "Oops!",
                text: "Failed to send passcode.",
                icon: "warning",
                confirmButtonText: "OK"
              });
            });
        }

          let formData = new FormData();

          try {
            const res = await fetch("/api/employees/employee/upload-photo", {
              method: "POST",
              body: formData
            });

            const data = await res.json();
            console.log("Upload response:", data);

            if (data.success) {
              uploadedPhotoPath = data.filePath;
              console.log("Saved uploaded photo path:", uploadedPhotoPath);
            } else {
              alert("Photo upload failed!");
            }
          } catch (err) {
            console.error("Upload error:", err);
            alert("Photo upload error!");
          }
        });

        document.addEventListener("DOMContentLoaded", function () {

          document.getElementById("closeCreateUserModalBtn")
            ?.addEventListener("click", () => {
              document.getElementById("createUserModal").style.display = "none";
            });

        // top circle image picking file from folder 
        const photoInput = document.getElementById("photo");
        const photoPreview = document.getElementById("employeePhotoPreview");

        /* CLICK ON IMAGE → OPEN FILE PICKER */
        photoPreview.addEventListener("click", () => {
          photoInput.click();
        });

        /* UPDATE IMAGE ON SELECT */
        photoInput.addEventListener("change", function () {
          const file = this.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = function (e) {
            photoPreview.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });




        // show photo after adding 
        document.getElementById("photo").addEventListener("change", function (event) {
          const file = event.target.files[0];
          if (!file) return;

          const reader = new FileReader();

          reader.onload = function (e) {
            document.getElementById("employeePhotoPreview").src = e.target.result;
          };

          reader.readAsDataURL(file);
        });


        // session
        fetch("/api/auth/session-check")
          .then(res => res.json())
          .then(data => {
            if (!data.loggedIn) {
              // Not logged in → go to login
              window.location.href = "index.html";
            } else {
              document.getElementById("userName").textContent = data.user.name;

            }
          })
          .catch(error => {
            console.error("Session check failed:", error);
            window.location.href = "index.html";
          });

        // logout
        function logoutUser() {
          Swal.fire({
            title: "Are you sure?",
            text: "You will be logged out from your session.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Yes, logout",
            cancelButtonText: "Cancel"
          }).then((result) => {
            if (result.isConfirmed) {
              // Call logout API
              fetch("/api/auth/logout")
                .then(res => res.json())
                .then(data => {
                  if (data.success) {
                    Swal.fire({
                      title: "Logged Out!",
                      text: "You have been successfully logged out.",
                      icon: "success",
                      showConfirmButton: false,
                      timer: 2000
                    });

                    setTimeout(() => {
                      window.location.href = "index.html"; // Redirect to login
                    }, 2000);
                  } else {
                    Swal.fire("Oops!", "Logout failed. Try again.", "error");
                  }
                })
                .catch(err => {
                  console.error("Logout error:", err);
                  Swal.fire("Error", "Something went wrong. Try again.", "error");
                });
            }
          });
        }
      </script>
